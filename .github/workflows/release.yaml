name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example v1.2.3
        required: true
        type: string
      prerelease:
        description: Mark the GitHub Release as a prerelease
        required: false
        type: boolean
        default: false

concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

permissions: {}

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Refuse unsupported release branch
        shell: bash
        run: |
          case "$GITHUB_REF" in
            refs/heads/main|refs/heads/maintenance/*)
              ;;
            *)
              echo "Releases must be dispatched from main or maintenance/*; got ${GITHUB_REF}" >&2
              exit 1
              ;;
          esac

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          version="$INPUT_VERSION"
          if [[ ! "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Version must be semver with a leading v, for example v1.2.3" >&2
            exit 1
          fi
          if git rev-parse "$version" >/dev/null 2>&1; then
            tagged_commit="$(git rev-list -n 1 "$version")"
            current_commit="$(git rev-parse HEAD)"
            if [[ "$tagged_commit" != "$current_commit" ]]; then
              echo "Tag $version already exists at $tagged_commit, not current commit $current_commit" >&2
              exit 1
            fi
          fi
          package_version="${version#v}"
          spec_version="$(python3 -c 'import json; print(json.load(open("spec/vertesia-openapi.json"))["info"]["version"])')"
          if [[ "$spec_version" != "$package_version" ]]; then
            echo "OpenAPI spec info.version is $spec_version, want $package_version" >&2
            exit 1
          fi
          configured_version="$(awk -F': ' '/packageVersion:/ {print $2}' openapi-generator-config.yaml | tr -d '"')"
          if [[ "$configured_version" != "$package_version" ]]; then
            echo "openapi-generator-config.yaml packageVersion is $configured_version, want $package_version" >&2
            exit 1
          fi
          pyproject_version="$(python3 -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          if [[ "$pyproject_version" != "$package_version" ]]; then
            echo "pyproject.toml version is $pyproject_version, want $package_version" >&2
            exit 1
          fi
          echo "tag=$version" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Run Ruff checks
        run: |
          python -m ruff check .
          python -m ruff format --check .

      - name: Build distributions
        run: |
          python -m build
          python -m twine check dist/*

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: python-distributions
          path: dist/
          if-no-files-found: error

  publish-pypi:
    name: Publish PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # Publish to PyPI with trusted publishing.
      contents: read
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: python-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          skip-existing: true

  github-release:
    name: GitHub Release
    needs: [build, publish-pypi]
    runs-on: ubuntu-latest
    permissions:
      contents: write # Create the release tag and GitHub Release.
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: python-distributions
          path: dist/

      - name: Create or verify tag
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.build.outputs.tag }}
        shell: bash
        run: |
          tag="$RELEASE_TAG"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            tagged_commit="$(git rev-list -n 1 "$tag")"
            current_commit="$(git rev-parse HEAD)"
            if [[ "$tagged_commit" != "$current_commit" ]]; then
              echo "Tag $tag already exists at $tagged_commit, not current commit $current_commit" >&2
              exit 1
            fi
          else
            gh auth setup-git
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$tag" -m "$tag"
            git push origin "$tag"
          fi

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          PRERELEASE: ${{ inputs.prerelease }}
          RELEASE_TAG: ${{ needs.build.outputs.tag }}
        shell: bash
        run: |
          tag="$RELEASE_TAG"
          prerelease_args=()
          if [[ "$PRERELEASE" == "true" ]]; then
            prerelease_args=(--prerelease)
          fi

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/* --clobber
          else
            gh release create "$tag" \
              --title "$tag" \
              --generate-notes \
              "${prerelease_args[@]}" \
              dist/*
          fi

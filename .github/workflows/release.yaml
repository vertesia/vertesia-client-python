name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example v1.2.3
        required: true
        type: string
      prerelease:
        description: Mark the GitHub Release as a prerelease
        required: false
        type: boolean
        default: false

concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Refuse unsupported release branch
        shell: bash
        run: |
          case "$GITHUB_REF" in
            refs/heads/main|refs/heads/maintenance/*)
              ;;
            *)
              echo "Releases must be dispatched from main or maintenance/*; got ${GITHUB_REF}" >&2
              exit 1
              ;;
          esac

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version
        id: version
        shell: bash
        run: |
          version="${{ inputs.version }}"
          if [[ ! "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Version must be semver with a leading v, for example v1.2.3" >&2
            exit 1
          fi
          if git rev-parse "$version" >/dev/null 2>&1; then
            tagged_commit="$(git rev-list -n 1 "$version")"
            current_commit="$(git rev-parse HEAD)"
            if [[ "$tagged_commit" != "$current_commit" ]]; then
              echo "Tag $version already exists at $tagged_commit, not current commit $current_commit" >&2
              exit 1
            fi
          fi
          package_version="${version#v}"
          spec_version="$(python3 -c 'import json; print(json.load(open("spec/vertesia-openapi.json"))["info"]["version"])')"
          if [[ "$spec_version" != "$package_version" ]]; then
            echo "OpenAPI spec info.version is $spec_version, want $package_version" >&2
            exit 1
          fi
          configured_version="$(awk -F': ' '/packageVersion:/ {print $2}' openapi-generator-config.yaml | tr -d '\"')"
          if [[ "$configured_version" != "$package_version" ]]; then
            echo "openapi-generator-config.yaml packageVersion is $configured_version, want $package_version" >&2
            exit 1
          fi
          pyproject_version="$(python3 -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          if [[ "$pyproject_version" != "$package_version" ]]; then
            echo "pyproject.toml version is $pyproject_version, want $package_version" >&2
            exit 1
          fi
          echo "tag=$version" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"

      - name: Run Ruff checks
        run: |
          python -m ruff check .
          python -m ruff format --check .

      - name: Build distributions
        run: |
          python -m build
          python -m twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/
          if-no-files-found: error

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  github-release:
    needs: [build, publish-pypi]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist/

      - name: Create or verify tag
        shell: bash
        run: |
          tag="${{ needs.build.outputs.tag }}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            tagged_commit="$(git rev-list -n 1 "$tag")"
            current_commit="$(git rev-parse HEAD)"
            if [[ "$tagged_commit" != "$current_commit" ]]; then
              echo "Tag $tag already exists at $tagged_commit, not current commit $current_commit" >&2
              exit 1
            fi
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$tag" -m "$tag"
            git push origin "$tag"
          fi

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${{ needs.build.outputs.tag }}"
          prerelease_flag=""
          if [[ "${{ inputs.prerelease }}" == "true" ]]; then
            prerelease_flag="--prerelease"
          fi

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/* --clobber
          else
            gh release create "$tag" \
              --title "$tag" \
              --generate-notes \
              $prerelease_flag \
              dist/*
          fi

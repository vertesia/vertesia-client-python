    HttpTimeoutOptions:
      type: object
      properties:
        headersTimeout:
          type: number
          description: Time (ms) to wait for the first response byte after the request is
            sent.
        bodyTimeout:
          type: number
          description: Time (ms) between body chunks once streaming has started.
        connectTimeout:
          type: number
          description: TCP/TLS connect timeout (ms).
        keepAliveTimeout:
          type: number
          description: Idle socket reuse timeout (ms).
      additionalProperties: false
      description: >-
        HTTP timeouts applied to a driver's upstream LLM-provider calls.


        All values are in milliseconds. Drivers should map these onto whatever
        HTTP client their SDK uses; the defaults applied in
        `@llumiverse/core/createDriverHttpAgent` are:   -
        headersTimeout:   60_000   - bodyTimeout:      60_000   -
        connectTimeout:   10_000   - keepAliveTimeout: 30_000


        The defaults are deliberately tighter than Node's undici default (5
        minutes for headers/body) so a hung upstream surfaces quickly. Bump
        `bodyTimeout` for streaming flows that have legitimate silent gaps (e.g.
        tool-using agents).

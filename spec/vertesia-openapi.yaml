          type: string
        workflow_class:
          type: string
        task_queue:
          type: string
        vars:
          type: object
          additionalProperties: true
        input_type:
          $ref: "#/components/schemas/WorkflowRuleInputType"
      required:
        - type
        - endpoint
      additionalProperties: false
    WebhookEventDeliveryTargetInput:
      type: object
      additionalProperties: false
      properties:
        rotate_signing_secret:
          type: boolean
          description: Request rotation of the stored signing secret on update.
        type:
          type: string
          const: webhook
        url:
          type: string
        signing_mode:
          $ref: "#/components/schemas/WebhookSigningMode"
        payload_mode:
          $ref: "#/components/schemas/WebhookPayloadMode"
        headers:
          $ref: "#/components/schemas/StringValueMap"
        encrypted_headers:
          type: boolean
        timeout_ms:
          type: number
        result_path:
          type: string
        custom_data:
          type: object
          additionalProperties: true
      required:
        - type
        - url
    EventIngestTransform:
      type: object
      properties:
        action_path:
          type: string
          description: Dot-path to the value used as `event.action`, e.g. `event.type`.
        resource_type_path:
          type: string
          description: Dot-path to the value used as `event.resource_type`.
        resource_id_path:
          type: string
          description: Dot-path to the value used as `event.resource_id`.
        event_type_header:
          type: string
          description: Request **header** carrying the event family (e.g. GitHub's
            `x-github-event`), captured into `event.details.event_type`. Lets
            subscriptions and `resource_rules` discriminate event shapes when
            one channel receives heterogeneous payloads whose `action` alone is
            ambiguous (e.g. `created` for both an issue comment and a PR review
            comment).
        resource_rules:
          type: array
          items:
            $ref: "#/components/schemas/EventIngestResourceRule"
          description: Ordered conditional rules for `resource_type` + `resource_id`
            (first match wins). Used when a single `resource_id_path` can't
            serve every payload shape. Falls back to `resource_type_path` /
            `resource_id_path` / channel defaults when no rule matches.
        idempotency_key_path:
          type: string
          description: Dot-path to a deduplication key (same semantics as
            `idempotency_key`).
        idempotency_key_header:
          type: string
          description: Request **header** to use as the deduplication key when the body
            has no stable per-delivery id — e.g. GitHub App's
            `x-github-delivery`, unique per delivery for all event types, which
            is the only reliable dedup key when one App webhook delivers
            heterogeneous payloads (issues + comments) to a single channel.
            Lower precedence than `idempotency_key_path`.
        timestamp_path:
          type: string
          description: Dot-path to an ISO 8601 event timestamp.
        static_details:
          type: object
          additionalProperties: true
          description: Static fields merged into `event.details`.
      additionalProperties: false
      description: Declarative mapping from a raw third-party webhook body to platform
        event fields, for senders that cannot shape their payload (GitHub,
        Slack, DocuSign, Salesforce, ...). Each `*_path` is a dot-path into the
        JSON body (array indices supported, e.g. `commits.0.id`). Extracted
        values override the channel defaults; the full raw body is always
        preserved under `event.details.payload`.
    EventIngestResourceRule:
      type: object
      properties:
        event_type:
          type: array
          items:
            type: string
          description: Match when the captured `event_type` (see `event_type_header`) is
            one of these.
        when_path_exists:
          type: string
          description: Match only when this dot-path resolves to a defined, non-null value
            (e.g. `issue.pull_request`).
        when_path_absent:
          type: string
          description: Match only when this dot-path is undefined/null.
        resource_type:
          type: string
          description: "`resource_type` to set when this rule matches."
        resource_id_path:
          type: string
          description: "`resource_id` from a single dot-path."
        resource_id_template:
          type: string
          description: ...or a composed `resource_id` from a `{{dot.path}}` template
            against the body, e.g.
            `{{repository.full_name}}#{{pull_request.number}}`. Takes precedence
            over `resource_id_path`.
      additionalProperties: false
      description: "A conditional rule for deriving `resource_type` + `resource_id`
        from the body, evaluated in order (first match wins) when a single
        dot-path can't serve every payload shape a channel receives. A sender
        whose one webhook delivers heterogeneous events (e.g. a GitHub App:
        issues, issue comments, PR reviews) needs different thread identities
        per event family; these rules express that without baking provider
        knowledge into the server."
    EventIngestSignatureConfig:
      type: object
      properties:
        header:
          type: string
          description: Request header carrying the signature, e.g. `x-hub-signature-256`.
        algorithm:
          $ref: "#/components/schemas/EventIngestSignatureAlgorithm"
        encoding:
          $ref: "#/components/schemas/EventIngestSignatureEncoding"
        prefix:
          type: string
          description: Literal prefix stripped from the header value before comparison,
            e.g. `sha256=`.
        has_secret:
          type: boolean
          description: "Server-managed: whether a signing secret is stored for this
            channel."
        secret_hint:
          type: string
          description: "Server-managed: label/hint of the stored signing secret."
      required:
        - header
      additionalProperties: false
      description: "Optional HMAC signature verification for an ingest channel. When
        configured, the server recomputes `HMAC(algorithm, signing_secret,
        rawBody)` and compares it (timing-safe) to the value in `header`, after
        stripping `prefix`. Covers GitHub-style `X-Hub-Signature-256:
        sha256=<hex>` and a plain Salesforce Apex-callout HMAC."
    EventIngestSignatureAlgorithm:
      type: string
      enum:
        - sha256
        - sha1
      description: >-
        How an ingest channel authenticates inbound requests in addition to the
        channel ingest token:

        - none (default): token only.

        - hmac: the sender signs the raw request body with a shared secret
        (GitHub/Stripe style) and the   server verifies the signature. The token
        may then be optional (`token_optional`).
    EventIngestSignatureEncoding:
      type: string
      enum:
        - hex
        - base64
    DataStoreItem:

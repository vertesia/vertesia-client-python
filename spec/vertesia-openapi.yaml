          description: "Width in grid cells (default: 1)"
        height:
          type: number
          description: "Height in grid cells (default: 1)"
      required:
        - row
        - col
      additionalProperties: false
      description: Panel position within the dashboard grid.
    DashboardLayout:
      type: object

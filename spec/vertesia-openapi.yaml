      additionalProperties: false
    EventSemanticCondition:
      type: object
      properties:
        instruction:
          type: string
          description: Natural-language predicate, e.g. "the document appears to be a
            signed contract amendment".
        evaluator:
          $ref: "#/components/schemas/SemanticEvaluator"
          description: Defaults to the interaction evaluator.
        mode:
          $ref: "#/components/schemas/SemanticConditionMode"
          description: "enforce: a negative verdict skips delivery. shadow: the verdict is
            recorded on the delivery intent but never blocks delivery. Defaults
            to enforce."
        on_error:
          $ref: "#/components/schemas/SemanticConditionOnError"
          description: "What to do when evaluation errors out after retries: fail_open
            delivers anyway, fail_closed does not deliver. Defaults to
            fail_closed."
      required:
        - instruction
      additionalProperties: false
      description: A natural-language predicate evaluated by an LLM after all
        structural filters (categories, actions, resource types, JSONLogic
        condition) have matched.
    SemanticEvaluator:
      type: object
      oneOf:
        - $ref: "#/components/schemas/InteractionSemanticEvaluator"
        - $ref: "#/components/schemas/AgentSemanticEvaluator"
      discriminator:
        propertyName: type
        mapping:
          interaction: "#/components/schemas/InteractionSemanticEvaluator"
          agent: "#/components/schemas/AgentSemanticEvaluator"
      required:
        - type
    InteractionSemanticEvaluator:
      type: object
      properties:
        type:
          type: string
          const: interaction
        interaction_ref:
          type: string
          description: Optional stored interaction ref used as the classifier. When
            omitted a built-in ad-hoc classifier prompt is used.
        config:
          $ref: "#/components/schemas/InteractionExecutionConfiguration"
        enrich_with_content:
          type: boolean
          description: Include an excerpt of the content object text when the event
            resource is a content object.
        max_content_chars:
          type: number
          description: Maximum characters of content text included in the classifier prompt.
      required:
        - type
      additionalProperties: false
      description: Evaluates the semantic condition with a single LLM call (no tools).
        The event envelope — optionally enriched with an excerpt of the content
        object text — is classified against the instruction.
    AgentSemanticEvaluator:
      type: object
      properties:
        type:
          type: string
          const: agent
        interaction_ref:
          type: string
          description: Agent interaction ref. Defaults to the general-purpose system agent.
        tool_names:
          type: array
          items:
            type: string
        max_iterations:
          type: number
        config:
          $ref: "#/components/schemas/InteractionExecutionConfiguration"
      required:
        - type
      additionalProperties: false
      description: Evaluates the semantic condition with a non-interactive agent run
        that may use tools to enrich its decision (fetch documents, inspect
        processes, ...). Slower and more expensive than the interaction
        evaluator; the delivery intent stays in `evaluating` until the agent
        completes.
    SemanticConditionOnError:
      type: string
      enum:
        - fail_open
        - fail_closed

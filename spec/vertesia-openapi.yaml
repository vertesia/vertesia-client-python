        replay_root_event_id:
          type: string
        replayed_by:
          type: string
        action:
          $ref: "#/components/schemas/AuditAction"
        resource_type:
          type: string
        resource_id:
          type: string
        timestamp:
          type: string
        request_id:
          type: string
        status:
          type: number
        success:
          type: boolean
        principal_id:
          type:
            - string
            - "null"
        principal_type:
          type:
            - string
            - "null"
        effective_principal_id:
          type:
            - string
            - "null"
        roles:
          type: array
          items:
            type: string
        account_id:
          type:
            - string
            - "null"
        project_id:
          type:
            - string
            - "null"
        tenant_id:
          type:
            - string
            - "null"
        account_name:
          type:
            - string
            - "null"
        project_name:
          type:
            - string
            - "null"
        provider:
          type:
            - string
            - "null"
          description: Provider type for billable/provider-backed events, e.g. vertexai,

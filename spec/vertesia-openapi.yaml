          $ref: "#/components/schemas/AppOAuthProviderParams"
          description: OAuth credentials for named providers, keyed by the provider key
            from oauth_providers. Collected from the user at install time for
            providers with required_at_install. Separate from oauth_params to
            avoid key collisions between provider keys and collection ids.

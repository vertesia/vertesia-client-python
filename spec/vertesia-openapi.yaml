    DSLActivityStep:
      type: object
      properties:
        type:
          type: string
          const: activity
          description: The type fo the step. If not set defaults to "activity"
        name:
          type: string
          description: The name of the activity function
        title:
          type: string
          description: Title of the activity to be displayed in the UI workflow builder
        description:
          type: string
          description: The description of the activity to e displayed in the UI workflow
            builder
        params:
          type: object
          additionalProperties: true
          description: Activities parameters. These parameters can be either literals
            (hardcoded strings, numbers, booleans, objects, arrays etc.), either
            references to the workflow variables. The workflow variables are
            built from the workflow params (e.g. the workflow configuration) and
            from the result of the previous activities.
        output:
          type: string
          description: The name of the workflow variable that will store the result of the
            activity If not specified the result will not be stored The
            parameters describe how the actual parameters will be obtained from
            the workflow execution vars. since it may contain references to
            workflow execution vars.
        condition:
          type: object
          additionalProperties: true
          description: "A JSON expression which evaluate to true or false similar to mongo
            matches. We support for now basic expression like: $true, $false,
            $eq, $ne, $gt, $gte, $lt, $lte, $in, $nin, $regexp {$eq: {name:
            value}}, Ex: {$eq: {wfVarName: value}}"
        import:
          $ref: "#/components/schemas/ImportSpec"
          description: 'The import spec is used to import data from workflow variables.
            The import spec is a list of variable names to import from the
            workflow context. You can also use objects to rename the imported
            variables, or to reference an expression. Example: ["runId",
            {"typeId": "docType.id"}]'
        fetch:
          $ref: "#/components/schemas/ActivityFetchSpecMap"
          description: The fetch phase is used to fetch data from external sources.
        projection:
          type: object
          additionalProperties: true
          description: Projection to apply to the result. Not all activities support this.
        parallel:
          type: boolean
          description: If true the activity will be executed in parallel with the other
            activities. (i.e. the workflow will not wait for the activity to
            finish before starting the next one)
        await:
          type: string
          description: Await for a parallel activity execution to return.
        options:
          $ref: "#/components/schemas/DSLActivityOptions"
          description: Activity options for configuring the activity execution, which
            overrides the activity options defined at workflow level.
      required:
        - name
        - type
      additionalProperties: false
    ImportSpec:
      type: array
      items: {}
    ActivityFetchSpecMap:
      type: object
      additionalProperties:
        $ref: "#/components/schemas/ActivityFetchSpec"
    ActivityFetchSpec:
      type: object
      properties:
        type:
          type: string
          enum:
            - document
            - document_type
            - interaction_run
          description: The data provider name
        source:
          type: string
          description: An optional URI to the data source.
        query:
          type: object
          additionalProperties: true
          description: The query to be executed by the data provider
        select:
          type: string
          description: a string of space separated field names. Prefix a field name with
            "-" to exclude it from the result.
        limit:
          type: number
          description: The number of results to return. If the result is limited to 1 the
            result will be a single object
        on_not_found:
          type: string
          enum:
            - ignore
            - throw
          description: How to handle not found objects. 1. ignore - Ignore and return an
            empty array for multi objects query (or undefined for single object
            query) or empty array for multiple objects throw an error. 2. throw
            - Throw an error if the object or no objects are found.
      required:
        - type
        - query
      additionalProperties: false

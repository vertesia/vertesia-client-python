          description: Agent name that generated the document
        agent_run_id:
          type: string
          description: Agent run ID to display in footer
        subtitle:
          type: string
          description: Document subtitle
        author:
          type: array
          items:
            type: string
          description: Document author(s)
        date:
          type: string
          description: Document date (displayed in header and title page; defaults to
            today if omitted)
      additionalProperties: false
      description: Metadata for PDF rendering (displayed in header/footer)
    IssueTokenResponse:
      type: object
      properties:
        token:
          type: string
        token_type:
          type: string
          const: Bearer
        expires_in:
          type: number
      required:
        - token
        - token_type
      additionalProperties: false
    IssueTokenRequest:
      type: object
      discriminator:
        propertyName: type
        mapping:
          apikey: "#/components/schemas/ApiKeyTokenRequest"
          user: "#/components/schemas/UserTokenRequest"
          project: "#/components/schemas/ProjectTokenRequest"
          environment: "#/components/schemas/EnvironmentTokenRequest"
          agent: "#/components/schemas/AgentTokenRequest"
          service_account: "#/components/schemas/ServiceAccountTokenRequest"
      required:
        - type
      oneOf:
        - $ref: "#/components/schemas/ApiKeyTokenRequest"
        - $ref: "#/components/schemas/UserTokenRequest"
        - $ref: "#/components/schemas/ProjectTokenRequest"
        - $ref: "#/components/schemas/EnvironmentTokenRequest"
        - $ref: "#/components/schemas/AgentTokenRequest"
        - $ref: "#/components/schemas/ServiceAccountTokenRequest"
    ApiKeyTokenRequest:
      type: object
      properties:
        type:
          type: string
          const: apikey
        audience:
          type: string
        algorithm:
          $ref: "#/components/schemas/SigningAlgorithm"
          description: Signing algorithm - defaults to ES256. Use RS256 for Azure AD
            compatibility.
        key:
          type: string
      required:
        - key
        - type
      additionalProperties: false
    SigningAlgorithm:
      type: string
      enum:
        - ES256
        - RS256
    UserTokenRequest:
      type: object
      properties:
        type:
          type: string
          const: user
        audience:
          type: string
        algorithm:
          $ref: "#/components/schemas/SigningAlgorithm"
          description: Signing algorithm - defaults to ES256. Use RS256 for Azure AD
            compatibility.
        user_id:
          type: string
        account_id:
          type: string
        project_id:
          type: string
        expires_at:
          type: number
        on_behalf_of:
          type: string
      required:
        - type
      additionalProperties: false
    ProjectTokenRequest:
      type: object
      properties:
        type:
          type: string
          const: project
        audience:
          type: string
        algorithm:
          $ref: "#/components/schemas/SigningAlgorithm"
          description: Signing algorithm - defaults to ES256. Use RS256 for Azure AD
            compatibility.
        project_id:
          type: string
        account_id:
          type: string
      required:
        - account_id
        - project_id
        - type
      additionalProperties: false
    EnvironmentTokenRequest:
      type: object
      properties:
        type:
          type: string
          const: environment
        audience:
          type: string
        algorithm:
          $ref: "#/components/schemas/SigningAlgorithm"
          description: Signing algorithm - defaults to ES256. Use RS256 for Azure AD
            compatibility.
        environment_id:
          type: string
        environment_name:
          type: string
        project_id:
          type: string
        account_id:
          type: string
      required:
        - account_id
        - environment_id
        - environment_name
        - project_id
        - type
      additionalProperties: false
    AgentTokenRequest:
      type: object
      properties:
        type:
          type: string
          const: agent
        audience:
          type: string
        algorithm:
          $ref: "#/components/schemas/SigningAlgorithm"
          description: Signing algorithm - defaults to ES256. Use RS256 for Azure AD
            compatibility.
        account_id:
          type: string
        project_id:
          type: string
        name:
          type: string
        on_behalf_of:
          type: string
          description: >-
            User information.


            The value of this field can be either:   - a signed Vertesia token
            used to verify the user context   - a user ID prefixed with `user:`
            to indicate the user on behalf of whom the agent is     acting.
      required:
        - account_id
        - on_behalf_of
        - project_id
        - type
      additionalProperties: false
      description: >-
        Agent token for a service account to act as agent on behalf of a user.


        Two trust paths are supported:


        - `user_access_token`: a live signed Vertesia token. STS verifies the
        user context from that token.

        - `workload_id_token`: a workload acts on behalf of a user. It implies
        that a full verification   will be performed based on the workload
        identity.
    ServiceAccountTokenRequest:
      type: object
      properties:
        type:
          type: string
          const: service_account
        audience:
          type: string
        algorithm:
          $ref: "#/components/schemas/SigningAlgorithm"
          description: Signing algorithm - defaults to ES256. Use RS256 for Azure AD
            compatibility.
        account_id:
          type: string
        project_id:
          type: string
        roles:
          type: array
          items:
            $ref: "#/components/schemas/SystemRoles"
        name:
          type: string
        email:
          type: string
      required:
        - account_id
        - project_id
        - type
      additionalProperties: false
paths:
  /projects:
    get:
      operationId: ListProjects
      tags:
        - Projects
      summary: List projects
      description: Lists projects visible to the current principal.
      security:
        - bearerAuth: []
        - OpenID: []
      parameters:
        - name: account
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Projects.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectRefArray"
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: Internal Server Error
                status: 500
                message: Internal server error.
        4XX:
          description: Client error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: Bad Request
                status: 400
                message: Request validation failed.
      x-vertesia-permissions: []
      x-vertesia-source:
        file: ../../apps/studio-server/src/api/projects/index.ts
        className: ProjectsResource
        methodName: listProjects
    post:
      operationId: CreateProject
      tags:
        - Projects
      summary: Create a project
      description: >-
        Creates a new project in the current account and initializes default
        project resources.


        **Required permissions:** `account:admin`
      security:
        - bearerAuth: []
        - OpenID: []

          type: boolean
          description: Whether the tool is part of the default toolkit when no explicit
            `tool_names` is provided.
        annotations:
          $ref: "#/components/schemas/MCPToolAnnotations"
        unlocked_tools:
          type: array
          items:
            type: string
          description: "For skills (`learn_*`): tool names this skill unlocks when invoked."
        app_install_id:
          type: string
          description: "Present when `source === 'app'`: the app installation that
            provides this tool."
        app_name:
          type: string
          description: "Present when `source === 'app'`: the app's manifest name (used for
            `principal.apps` filtering)."
        interaction_id:
          type: string
          description: "Present when `source === 'interaction'`: the interaction document
            id."
        is_agent:
          type: boolean
          description: "Present when `source === 'interaction'`: true if the interaction
            has `agent_runner_options.is_agent === true`. Lets UI consumers
            distinguish sub-agents (autonomous, run-to-completion) from regular
            interaction tools."
      required:
        - name
        - source
      additionalProperties: false
      description: A single tool entry in the unified registry, regardless of where it
        came from. Returned by `GET /tools` and the resolution map of `POST
        /tools/validate`.
    ToolSource:
      type: string
      enum:
        - builtin
        - app
        - interaction
      description: >-
        Origin of a tool in the unified project-scoped tool registry.


        - `builtin`: anything statically registered on the worker — workflow
        builtins, studio agent tools, and sys skills

        - `app`: tools contributed by an installed app for the project

        - `interaction`: a project interaction exposed via `tag=tool` /
        `is_tool=true` / `is_skill=true`


        Skill semantics (the tool unlocks others when invoked) are NOT part of
        the source. They are identified universally by the `learn_` prefix in
        the tool name. This matches how the runtime registry stores them and
        avoids splitting one logical origin into two sources.
    ToolValidationResult:
      type: object
      properties:
        name:
          type: string
          description: The name the caller asked about.
        valid:
          type: boolean
          description: True if the name resolves to exactly one tool in the project's
            unified registry.
        source:
          $ref: "#/components/schemas/ToolSource"
          description: "When `valid`: which source the tool came from."
        app_install_id:
          type: string
          description: "When `valid` and `source === 'app'`: the app installation that
            provides the tool."
        app_name:
          type: string
          description: "When `valid` and `source === 'app'`: the app's manifest name."
        suggestion:
          type: string
          description: "When `!valid` and a close match exists: the suggested replacement
            name (Levenshtein-based)."
        collisions:
          type: array
          items:
            type: object
            properties:
              source:
                $ref: "#/components/schemas/ToolSource"
              app_install_id:
                type: string
            required:
              - source
            additionalProperties: false
          description: Populated when a name appears in more than one source. Validation
            does not fail on this, but exposes the ambiguity so callers can
            surface a warning (last-write-wins resolution applies).
      required:
        - name
        - valid
      additionalProperties: false
      description: Per-name resolution result for `POST /tools/validate`.

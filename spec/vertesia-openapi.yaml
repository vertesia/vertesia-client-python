    AggregatedTool:
      type: object
      properties:
        name:
          type: string
          description: Name as referenced from `agent_runner_options.tool_names`. For
            interaction skills this is `learn_<endpoint>`.
        source:
          $ref: "#/components/schemas/ToolSource"
        description:
          type: string
        title:
          type: string

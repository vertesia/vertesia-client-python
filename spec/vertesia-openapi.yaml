          type: array
          items:
            type: string
        models:
          type: array
          items:
            type: string
        status:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string
        selectedOnly:
          type: boolean
      additionalProperties: false
    RunAnalyticsGroupBy:
      type: string
      enum:
        - interaction
        - modelId
        - project
        - status
        - tags
        - environment
    TimeResolution:
      type: string
      enum:
        - minute
        - hour
        - day
        - week
        - month
        - year
    AgentRunnerOptions:
      type: object
      properties:
        is_agent:
          type: boolean
          description: Whether this interaction is an agent (executable in Agent Runner).
        is_tool:
          type: boolean
          description: Whether this interaction is available as a tool (sub-agent).
        is_skill:
          type: boolean
          description: Whether this interaction is a skill (provides instructions without
            execution). Skills are injected into the agent's context based on
            context_triggers.
        context_triggers:
          $ref: "#/components/schemas/SkillContextTriggers"
          description: Context triggers for auto-injection of this skill. Only used when
            is_skill is true.
        skill_priority:
          type: number
          description: Injection priority for skills (higher = more likely to be selected
            when multiple match). Only used when is_skill is true.
        tool_names:
          type: array
          items:
            type: string
          description: "Array of default tool names available to this agent. For
            interactions: defines default tools. For execution payloads: you can
            use + and - to add or remove from default, if no sign, then list
            replaces default."
        search_scope:
          $ref: "#/components/schemas/AgentSearchScope"
          description: On which scope should the search be applied by the search_tool.
            Only supports 'collection' scope or undefined for now.
        collection_id:
          type: string
          description: The ID of the collection to restrict agent operations to. When
            specified, the agent's search and retrieval operations are limited
            to documents within this collection'.
        request_template:
          type: string
          description: Optional user-facing template for rendering run input as the first
            conversation entry. Supports {{field_name}}, {{nested.field}},
            {{items.0.name}}, and {{json}} placeholders resolved from the run
            data.
      additionalProperties: false
      description: Configuration options for Agent Runner functionality. These options
        control how interactions are exposed and executed in the Agent Runner.
    SkillContextTriggers:
      type: object
      properties:
        keywords:
          type: array
          items:
            type: string
          description: Keywords in user input that should trigger this skill
        tool_names:
          type: array
          items:
            type: string
          description: If these tools are being used, suggest this skill
        data_patterns:
          type: array
          items:
            type: string
          description: Regex patterns to match against input data
      additionalProperties: false
      description: Context triggers for auto-injection of skills. When these
        conditions match, the skill is automatically injected into the agent
        context.
    AgentSearchScope:
      type: string
      const: collection
      description: Defines the scope for agent search operations.

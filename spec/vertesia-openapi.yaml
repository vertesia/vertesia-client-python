        - effective_principal_id
        - roles
        - account_id
        - project_id
        - tenant_id
        - account_name
        - project_name
      additionalProperties: false
    EventCategory:
      type: string
      enum:
        - content
        - workflow
        - security
        - billing
        - system
        - external
    AuditAction:
      anyOf:
        - $ref: "#/components/schemas/KnownAuditAction"
        - type: string
    KnownAuditAction:
      type: string
      enum:
        - create
        - update
        - delete
        - bulk_create
        - bulk_change_type
        - bulk_update
        - bulk_delete
        - attach
        - detach
        - credentials_fill
        - credentials_totp_generation
        - publish
        - unpublish
        - inference
        - embedding
        - image_generation
    AuditMeter:
      type: object
      properties:
        category:
          type: string
        type:
          type: string
        quantity:
          type: number
      required:
        - category
        - type
        - quantity
      additionalProperties: false
      description: >-
        Generic metering entry attached to audit events. Used for cost
        attribution, usage tracking, and billing.


        Examples:   { category: "tokens", type: "input", quantity: 1234 }   {
        category: "tokens", type: "output", quantity: 567 }   { category:
        "compute", type: "duration_ms", quantity: 2100 }   { category:
        "processing", type: "pages", quantity: 12 }
    AsyncConversationExecutionPayload:
      type: object
      properties:
        interaction:
          type: string
          description: "The interaction name and suffixed by an optional tag or version
            separated from the name using a @ character If no version/tag part
            is specified then the latest version is used. Example:
            ReviewContract, ReviewContract@draft, ReviewContract@1,
            ReviewContract@some-tag"
        data:
          description: If a `@memory` property exists on the input data then the value
            will be used as the value of a memory pack location. and the other
            properties of the data will contain the memory pack mapping.
        config:
          $ref: "#/components/schemas/InteractionExecutionConfiguration"
        result_schema:
          anyOf:
            - $ref: "#/components/schemas/JSONSchema"
            - $ref: "#/components/schemas/SchemaRef"
            - type: "null"
        do_validate:
          type: boolean
        tags:
          type: array
          items:
            type: string
        conversation:
          description: The conversation state to be used in the execution if any. If the
            `true` is passed then the conversation will be returned in the
            result. The true value must be used for the first execution that
            starts the conversation. If conversation is falsy then no
            conversation is returned back. For regular executions the
            conversation is not returned back to save memory.
        workflow:
          $ref: "#/components/schemas/ExecutionRunWorkflow"
          description: The workflow related to this Interaction Run.
        prompts:
          type: array
          items:
            $ref: "#/components/schemas/InCodePrompt"
          description: Only used by ad-hoc interactions which defines the prompt in the
            execution payload itself These are temporary interactions using
            "tmp:" suffix.
        asyncCompletion:
          $ref: "#/components/schemas/AsyncCompletionOptions"
          description: Options for async completion and/or streaming LLM response chunks
            to Redis. Used by agent workflows for async activity completion and
            real-time streaming.
        type:
          type: string
          const: conversation
        notify_endpoints:
          type: array
          items:
            type: string
          description: An array of endpoint URLs to be notified upon execution
        task_queue:
          type: string
        tool_approval_mode:
          $ref: "#/components/schemas/AgentToolApprovalMode"
          description: Effective tool approval mode for interactive agent conversations.
        visibility:
          $ref: "#/components/schemas/ConversationVisibility"
          description: Visibility determine if the conversation should be seen by the user
            only or by anyone with access to the project If not specified, the
            default is project
        tool_names:
          type: array
          items:
            type: string
          description: The tools to use, list of tool or function names. You can use + and
            - to add or remove from default, if no sign, then list replaces
            default
        max_iterations:
          type: number
          description: The maximum number of iterations in case of a conversation. If <=0
            the default of 20 will be used.
        interactive:
          type: boolean
          description: Whether the conversation should be interactive or not
        user_channels:
          type: array
          items:
            $ref: "#/components/schemas/UserChannel"
          description: Array of channels to use for user communication. Multiple channels
            can be active simultaneously (e.g., both email and interactive).
            Each channel contains its own configuration and state (e.g., email
            threading info).
        disable_interaction_tools:
          type: boolean
          description: Whether to disable the generation of interaction tools or not.
        search_scope:
          $ref: "#/components/schemas/AgentSearchScope_Collection"
          description: On which scope should the searched by applied, by the search_tool.
            Only supports collection scope or null for now.
        collection_id:
          type: string
          description: The collection in which this workflow is executing
        disabled_mcp_collections:
          type: array
          items:
            type: string
          description: Denylist of MCP tool-collection ids deactivated for this
            conversation. `undefined`/empty means all installed/connected MCP
            collections are active (back-compat, and new servers stay active by
            default). Listed collections are excluded even if connected. Can be
            updated mid-conversation via the MCP config signal.
        checkpoint_tokens:
          type: number
          description: The token threshold in thousands (K) for creating checkpoints. If
            total tokens exceed this value, a checkpoint will be created. If not
            specified, the default is computed from the selected model context
            window (75%).
        strip_options:
          $ref: "#/components/schemas/ConversationStripOptions"
          description: Configuration for stripping large data (images, text) from
            conversation history to prevent JSON serialization issues and reduce
            storage bloat.
        task_id:
          type: string
          description: In child execution workflow, this is the curent task_id
        launch_id:
          type: string
          description: Parent-assigned launch ID for non-blocking workstreams. The child
            uses this when signaling progress/completion back to the parent.
        debug_mode:
          type: boolean
          description: Whether to enable debug mode
        max_nested_conversation_depth:
          type: number
          description: "Maximum depth for nested conversations to prevent infinite
            recursion (default: 5)"
        parent_metadata:
          type: object
          additionalProperties: true
          description: Metadata inherited from parent workflow. Used to propagate context
            (e.g., apiKey, session info) to child workflows/workstreams. When a
            workstream is spawned, the parent's `data` is preserved here so that
            child tools can access it via metadata.parent_metadata.
        non_blocking_subagents:
          type: boolean
          description: When true, subagent/workstream tool calls use fire-and-forget
            `startChild()` instead of blocking `executeChild()`. The parent
            continues reasoning while children run, receiving
            progress/completion via Temporal signals.
        restart_from_workflow_run_id:
          type: string
          description: Temporal runId of a previous workflow to restart/fork from. When
            set, conversation history is loaded from the old run's GCS storage
            instead of calling startConversation fresh.
        source_first_workflow_run_id:
          type: string
          description: The Temporal firstExecutionRunId of the original workflow being
            restarted/forked. Used by loadConversationForRestart to look up the
            original ExecutionRun so that token accumulation and status updates
            target a valid run.
        is_fork:
          type: boolean
          description: When true, indicates this is a fork (new ExecutionRun) rather than
            a restart (reuse original).
        agent_run_id:
          type: string
          description: "The AgentRun MongoDB _id. Used for artifact storage paths:
            agents/{agent_run_id}/ Flows into ConversationState and down to
            workstreams. Undefined for legacy workflows started before the
            AgentRun system."
        schedule_id:
          type: string
          description: The Schedule MongoDB _id. Set when this execution was triggered by
            a Temporal schedule. Used by the workflow to create an AgentRun on
            first run if agent_run_id is absent.
      required:
        - interaction
        - type
    ConversationVisibility:
      type: string
      enum:
        - private
        - project
    AgentSearchScope_Collection:
      type: string
      const: collection
      description: Search is scoped to a specific collection.
    AsyncInteractionExecutionPayload:
      type: object
      properties:
        interaction:
          type: string
          description: "The interaction name and suffixed by an optional tag or version
            separated from the name using a @ character If no version/tag part
            is specified then the latest version is used. Example:
            ReviewContract, ReviewContract@draft, ReviewContract@1,
            ReviewContract@some-tag"
        data:
          description: If a `@memory` property exists on the input data then the value
            will be used as the value of a memory pack location. and the other
            properties of the data will contain the memory pack mapping.
        config:
          $ref: "#/components/schemas/InteractionExecutionConfiguration"
        result_schema:
          anyOf:
            - $ref: "#/components/schemas/JSONSchema"
            - $ref: "#/components/schemas/SchemaRef"
            - type: "null"
        do_validate:
          type: boolean
        tags:
          type: array
          items:
            type: string
        conversation:
          description: The conversation state to be used in the execution if any. If the
            `true` is passed then the conversation will be returned in the
            result. The true value must be used for the first execution that
            starts the conversation. If conversation is falsy then no
            conversation is returned back. For regular executions the
            conversation is not returned back to save memory.
        workflow:
          $ref: "#/components/schemas/ExecutionRunWorkflow"
          description: The workflow related to this Interaction Run.
        prompts:
          type: array
          items:
            $ref: "#/components/schemas/InCodePrompt"
          description: Only used by ad-hoc interactions which defines the prompt in the
            execution payload itself These are temporary interactions using
            "tmp:" suffix.
        asyncCompletion:
          $ref: "#/components/schemas/AsyncCompletionOptions"
          description: Options for async completion and/or streaming LLM response chunks
            to Redis. Used by agent workflows for async activity completion and
            real-time streaming.
        type:
          type: string
          const: interaction
        notify_endpoints:
          type: array
          items:
            type: string
          description: An array of endpoint URLs to be notified upon execution
        task_queue:
          type: string
        include_previous_error:
          type: boolean
          description: Only used for non conversation workflows to include the error on
            next retry. If tools is defined this is not used
      required:
        - interaction
        - type
    PromptModalities:
      type: object
      properties:
        hasVideo:
          type: boolean
        hasImage:
          type: boolean
      required:
        - hasVideo
        - hasImage
      additionalProperties: false
    AccessControlResourceType:
      type: string
      enum:
        - project
        - environment
        - account
        - interaction
        - application
        - content_set
    AccessControlPrincipalType:
      type: string
      enum:
        - user
        - group
        - apikey
        - principal_set
    AceConditions:
      type: object
      properties:
        principal_props:
          $ref: "#/components/schemas/PropertyConditions"
          description: Property conditions matched against user/group properties at token
            time (PrincipalSet).
        resource_props:
          $ref: "#/components/schemas/PropertyConditions"
          description: Property conditions matched against object properties at query time
            (ResourceSet).
        scope:
          $ref: "#/components/schemas/AbacScope"
          description: Kind of object the `resource_props` matches. Used to disambiguate
            which partition's roles apply (e.g. content roles vs task roles) and
            to form the JWT `content_security` key prefix (`{scope}:{verb}`).
            Absent → `'document'` (default; emits bare `read`/`write`/`delete`
            keys for backward compatibility).
      additionalProperties: false
      description: >-
        Conditions attached to an ACE for dynamic matching.

        - `principal_props`: matched against user/group properties at token time
        (PrincipalSet).

        - `resource_props`: matched against object properties at query time
        (ResourceSet).
    PropertyConditions:
      $ref: "#/components/schemas/PropertyConditionValueMap"
    PropertyConditionValueMap:
      type: object
      additionalProperties:
        $ref: "#/components/schemas/PropertyConditionValue"
    PropertyConditionValue:
      description: A single condition value. Resolved and evaluated dynamically by
        token/content security code.
    AbacScope:
      type: string
      enum:
        - document
        - collection
        - task
    RoleDefinition:
      type: object
      properties:
        name:
          type: string
        permissions:
          type: array
          items:
            type: string
        domain:
          $ref: "#/components/schemas/RoleDomain"
      required:
        - name
        - permissions
        - domain
      additionalProperties: false
      description: >-
        Wire shape of a role returned by the IAM `/roles` endpoint.


        Permissions are typed `string[]` because role names span multiple
        partitions (system, content, future tasks/etc.) and each partition has
        its own vocabulary. For the tightly-typed system-only view (with
        `permissions: Permission[]`) use `SystemRoleDefinition` and the
        `/roles/system` endpoint.


        NOTE: this interface is intentionally non-generic. The OpenAPI generator
        doesn't handle TypeScript generics cleanly in array response types and
        produces a degenerate `RoleDefinitionArray` schema. Keeping the wire
        shapes concrete avoids that. `SystemRoleDefinition` extends and narrows
        `permissions` to `Permission[]`.
    RoleDomain:
      type: string
      enum:
        - system
        - content
        - tasks
      description: Logical grouping of roles by the service area that owns them. One
        domain may declare roles applicable to multiple scopes (e.g. the
        `content` domain owns roles applicable to both `document` and
        `collection` scopes). The `system` domain owns the built-in foundational
        roles (currently exposed as `SystemRoles`) — registered first so domain
        partitions cannot shadow them.
    SystemRoleDefinition:
      type: object
      properties:
        name:
          type: string
        permissions:
          type: array
          items:
            $ref: "#/components/schemas/Permission"
        domain:
          $ref: "#/components/schemas/RoleDomain"
      required:
        - domain
        - name
        - permissions
      additionalProperties: false
      description: "Tightly-typed view of a system-domain role: permissions are
        central `Permission` enum values. Returned by
        `client.iam.roles.listSystem()` and by the server's `/roles/system`
        endpoint."
    Permission:
      type: string
      enum:
        - interaction:read
        - interaction:write
        - interaction:delete
        - interaction:execute
        - run:read
        - run:write
        - environment:admin
        - app:manage
        - project:admin
        - project:integration_read
        - project:settings_write
        - api_key:create
        - api_key:read
        - api_key:secret_read
        - api_key:update
        - api_key:delete
        - account:read
        - account:write
        - account:admin
        - account:billing
        - billing:read
        - audit:read
        - account:member
        - content:read
        - content:read_all
        - content:write
        - content:delete
        - content:admin
        - content:superadmin
        - workflow:read
        - workflow:run
        - workflow:admin
        - workflow:superadmin
        - agent_run:read
        - task:read
        - task:manage
        - iam:impersonate
        - studio:access
    UserRef:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        picture:
          type: string
      required:
        - id
        - name
        - email
      additionalProperties: false
    AppUIConfig:
      type: object
      properties:
        src:
          type: string
          description: "The source URL of the app. The src can be a template which contain
            a variable named `buildId` which will be replaced with the current
            build id. For example: `/plugins/vertesia-review-center-${buildId}`"
        isolation:
          type: string
          enum:
            - shadow
            - css
          description: >-
            The isolation strategy. If not specified it defaults to shadow

            - shadow - use Shadow DOM to fully isolate the plugin from the host.

            - css - use CSS processing (like prefixing or other isolation
            techniques). Ligther but plugins may conflict with the host
        navigation:
          type: array
          items:
            $ref: "#/components/schemas/AppUINavItem"
          description: Navigation items for the app's sidebar UI. Only applicable for apps
            with UI capability in shell contexts (ie. CompositeApp shell).
        available_in:
          type: array
          items:
            $ref: "#/components/schemas/AppAvailableIn"
          description: >-
            Where this app's UI can be displayed.

            - 'app_portal': Available in the main app portal (standalone)

            - 'composite_app': Available within a CompositeApp shell Defaults to
            ['app_portal', 'composite_app'] for new apps.
      required:
        - src
      additionalProperties: false
    AppUINavItem:
      type: object
      properties:
        label:
          type: string
          description: Display label
        icon:
          type: string
          description: Lucide icon name or SVG content string
        route:
          type: string
          description: Route path relative to app base
        description:
          type: string
          description: Optional description shown on dashboard cards and other summary views
        children:
          type: array
          items:
            $ref: "#/components/schemas/AppUINavItem"
          description: Nested sub-items displayed within this item's collapsible section
        topLevel:
          type: boolean
          description: When true, this item appears as an independent entry in the sidebar
            (outside its parent app group)
        preferredSection:
          type: string
          enum:
            - default
            - footer
            - settings
          description: >-
            Which sidebar section this item should be placed in when first
            added.

            - "default" or unset: normal behavior (child of its app group)

            - "footer": placed in the footer section

            - "settings": placed in the settings section
      required:
        - label
        - icon
        - route
      additionalProperties: false
      description: Additional navigation item for an app's UI configuration. Used in
        AppUIConfig.navigation to define sidebar navigation entries in
        CompositeApp shell contexts. Icon values are Lucide icon component names
        or SVG content strings.
    AppAvailableIn:
      type: string
      enum:
        - app_portal
        - composite_app
    ToolCollectionObject:
      type: object
      discriminator:
        propertyName: type
        mapping:
          mcp: "#/components/schemas/MCPToolCollectionObject"
          vertesia_sdk: "#/components/schemas/VertesiaSDKToolCollectionObject"
      required:
        - type
      oneOf:
        - $ref: "#/components/schemas/MCPToolCollectionObject"
        - $ref: "#/components/schemas/VertesiaSDKToolCollectionObject"
    MCPToolCollectionObject:
      type: object
      properties:
        url:
          type: string
          description: The URL endpoint for the tool collection
        auth:
          $ref: "#/components/schemas/ToolCollectionAuthType"
          description: Optional authentication type required for this tool collection
        type:
          type: string
          const: mcp
        id:
          type: string
          description: Stable identifier for this collection. Used to key oauth_bindings
            on AppInstallation — protects against collection renames. Required
            for new manifests.
        name:
          type: string
          description: Name for the tool collection. Human-readable label for the
            collection. Used in UI.
        description:
          type: string
          description: Description for the tool collection. Helps users understand what
            tools this collection provides.
        namespace:
          type: string
          description: Prefix to use for tool names from this collection. Provides clean,
            readable tool names (e.g., "jira" instead of
            "https://mcp.atlassian.com/v1/mcp")
        oauth_app:
          type: string
          description: Reference to an OAuth provider name for this collection (legacy /
            manual path). When set, uses the OAuth provider's config (endpoints,
            client_id, client_secret) instead of MCP dynamic client registration
            or random fallback. The referenced OAuth provider must exist in the
            same project.
        oauth_config:
          $ref: "#/components/schemas/MCPOAuthConfig"
          description: Install-time OAuth provisioning blueprint. When present, the
            platform auto-creates an OAuth provider at install time using these
            values merged with any user-supplied required_at_install params. The
            created app is recorded in AppInstallation.oauth_bindings. Mutually
            exclusive with oauth_provider.
        oauth_provider:
          type: string
          description: "Reference to a key in AppManifestData.oauth_providers. When set,
            this collection shares the named provider's OAuth provider
            configuration. Mutually exclusive with oauth_config and oauth_app.
            Requires auth: \"oauth\" to be set."
        oauth_scopes:
          type: array
          items:
            type: string
          description: Additional OAuth scopes for this collection when using a shared
            oauth_provider. These are merged (union) with the provider's
            default_scopes at install time. Only valid when oauth_provider is
            set.
      required:
        - description
        - id
        - name
        - namespace
        - type
        - url
      additionalProperties: false
      description: MCP tool collection configuration (requires name, description, and
        namespace)
    ToolCollectionAuthType:
      type: string
      enum:
        - oauth
        - other
      description: Authentication type for tool collections
    MCPOAuthConfig:
      type: object
      properties:
        name:
          type: string
          description: Name for the OAuth provider to create at install time. Defaults to
            the collection id converted to kebab-case if not specified.
        display_name:
          type: string
          description: Human-readable display name for the created OAuth provider.
        grant_type:
          type: string
          enum:
            - authorization_code
            - client_credentials
        authorization_endpoint:
          type: string
        token_endpoint:
          type: string
        revocation_endpoint:
          type: string
        client_id:
          type: string
          description: Pre-configured client_id. Omit if the installer must supply it
            (include 'client_id' in required_at_install).
        use_pkce:
          type: boolean
        default_scopes:
          type: array
          items:
            type: string
        required_at_install:
          type: array
          items:
            type: string
            enum:
              - client_id
              - client_secret
              - scopes
          description: >-
            Parameters the installer must provide at install time. These are
            shown as form fields in composable-ui before the install completes.

            - 'client_id': user supplies the OAuth client ID

            - 'client_secret': user supplies the OAuth client secret
      additionalProperties: false
      description: Install-time OAuth provisioning blueprint for an MCP collection.
        Defines how to auto-create an OAuth provider when the app is installed.
        Does NOT affect runtime behaviour — the runtime uses oauth_bindings on
        AppInstallation.
    VertesiaSDKToolCollectionObject:
      type: object
      properties:
        url:
          type: string
          description: The URL endpoint for the tool collection
        auth:
          $ref: "#/components/schemas/ToolCollectionAuthType"
          description: Optional authentication type required for this tool collection
        type:
          type: string
          const: vertesia_sdk
        namespace:
          type: string
          description: Optional namespace to use for tool names from this collection. If
            not provided, the tool server default will be used.
        name:
          type: string
          description: Optional name for the tool collection. If not provided, the tool
            server default will be used.
        description:
          type: string
          description: Optional description for the tool collection. If not provided, the
            tool server default will be used.
      required:
        - type
        - url
      additionalProperties: false
      description: Vertesia SDK tool collection configuration
    MCPOAuthConfigMap:
      type: object
      additionalProperties:
        $ref: "#/components/schemas/MCPOAuthConfig"
    AppCapabilities:
      type: string
      enum:
        - ui
        - tools
        - interactions
        - types
        - processes
        - templates
    AppAccessControl:
      type: string
      enum:
        - all
        - ui
        - none
      description: >-
        Access control policy for an app installation. Declares which access
        surfaces are gated by per-user ACEs.


        - 'all' (default): every surface (UI portal, tool/endpoint use,
        contributions) requires   an explicit app_member ACE — the historical
        behavior.

        - 'ui': UI portal visibility requires an ACE, but tool/endpoint use and
        contributions   are open to anyone in the project.

        - 'none': fully open within the project — no ACE required for any
        surface.


        Declared on the manifest as the app's default. May be overridden
        per-installation.
    AppManifestSource:
      type: object
      properties:
        kind:
          type: string
          const: git
        git:
          type: object
          properties:
            url:
              type: string
            default_branch:
              type: string
            development_branch:
              type: string
          required:
            - url
          additionalProperties: false
      required:
        - kind
        - git
      additionalProperties: false
    AppInstallationOAuthBinding:
      type: object
      properties:
        collection_id:
          type: string
          description: "Stable collection identifier: MCPToolCollectionObject.id for new
            manifests. Legacy installations may still contain a name-based
            fallback value."
        oauth_provider_id:
          type: string
          description: MongoDB ObjectId of the OAuth provider in this project. Used for
            ID-based lookups (rename-proof).
        oauth_provider_name:
          type: string
          description: Name of the OAuth provider at creation time. Used by the workflow
            token path (getMCPClient → remoteMcpConnections.getToken) which
            looks up by name.
      required:
        - collection_id
        - oauth_provider_id
        - oauth_provider_name
      additionalProperties: false
      description: Binding between an MCP collection and an OAuth provider created at
        install time. Stored on AppInstallation so the runtime can look up the
        correct OAuth provider by ID, independent of manifest oauth_provider
        references (which may change).
    AppInstallationProviderBinding:
      type: object
      properties:
        provider_key:
          type: string
          description: Key from AppManifestData.oauth_providers
        oauth_provider_id:
          type: string
          description: MongoDB ObjectId of the created OAuth provider
        oauth_provider_name:
          type: string
          description: Name of the OAuth provider at creation time (for audit/display only)
      required:
        - provider_key
        - oauth_provider_id
        - oauth_provider_name
      additionalProperties: false
      description: Binding between a named OAuth provider and the OAuth provider
        created for it at install time. Stored on AppInstallation so the runtime
        can resolve the correct OAuth provider for collections that reference a
        shared provider via MCPToolCollectionObject.oauth_provider.
    AppOAuthCollectionParams:
      $ref: "#/components/schemas/OAuthClientCredentialsMap"
    OAuthClientCredentialsMap:
      type: object
      additionalProperties:
        $ref: "#/components/schemas/OAuthClientCredentials"
    OAuthClientCredentials:
      type: object
      properties:
        client_id:
          type: string
        client_secret:
          type: string
        scopes:
          type: array
          items:
            type: string
      additionalProperties: false
    AppOAuthProviderParams:
      $ref: "#/components/schemas/OAuthClientCredentialsMap"
    AppToolCollection:
      type: object
      properties:
        name:
          type: string
          description: The collection name
        description:
          type: string
          description: Optional collection description
        tools:
          type: array
          items:
            $ref: "#/components/schemas/AgentToolDefinition"
          description: the tools provided by this collection
      required:
        - name
        - tools
      additionalProperties: false
      description: A description of the tools provided by an app
    AgentToolDefinition:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        input_schema:
          type: object
          additionalProperties: true
        url:
          type: string
          description: 'The tool execution URL. It can be an absolute URL or a path in
            which case the URL is obtained using the base URL of the tool server
            API. Ex: http://tool-server.com/api/ Example of relative URLs:
            "tools/my-tool-collection" or "/api/tools/my-tool-collection"'
        category:
          type: string
          description: The tool category if any - for UI purposes.
        default:
          type: boolean
          description: |-
            Whether this tool is available by default.
            - true/undefined: Tool is always available to agents
            - false: Tool is only available when enabled by a skill via `tools`
        tools:
          type: array
          items:
            type: string
          description: "For skill tools (`learn_*`): the tool names this skill enables
            when called. Matches the `tools:` key used in SKILL.md frontmatter
            and built-in skill definitions — one name across the whole stack."
        annotations:
          $ref: "#/components/schemas/MCPToolAnnotations"
          description: MCP tool annotations providing hints about tool behavior and safety.
        approval_class:
          $ref: "#/components/schemas/AgentToolApprovalClass"
          description: Approval classification used by interactive agent approval modes.
            Use `requires_confirmation` for actions that must prompt even in
            full-control mode.
      additionalProperties: false
      required:
        - input_schema
        - name
      description: Tool definition with optional activation control for agent exposure.
    MCPToolAnnotations:
      type: object
      properties:
        title:
          type: string
          description: Human-readable display name for the tool
        readOnlyHint:
          type: boolean
          description: If true, the tool does not modify any state
        destructiveHint:
          type: boolean
          description: If true, the tool may perform irreversible destructive operations
        idempotentHint:
          type: boolean
          description: If true, calling the tool multiple times with the same args has no
            additional effect
        openWorldHint:
          type: boolean
          description: If true, the tool interacts with external entities outside the
            local environment
      additionalProperties: false
      description: Metadata hints from MCP tool annotations (per MCP spec).
    AgentToolApprovalClass:
      type: string
      enum:
        - read_only
        - side_effecting
        - control
        - requires_confirmation
      description: >-
        Approval behavior class for a tool exposed to agents.


        - `read_only`: reads or inspects state without changing Vertesia,
        external systems, or user-visible artifacts.

        - `side_effecting`: can create, update, delete, send, execute, schedule,
        or otherwise change state.

        - `control`: affects agent control flow or tool availability, not user
        data or external systems.

        - `requires_confirmation`: high-impact action that must ask the user
        even in interactive full-control mode.
    AppInstallationListEntry:
      type: object
      properties:
        id:
          type: string
        project:
          type: string
        settings:
          type: object
          additionalProperties: true
        tool_allowlist:
          type: array
          items:
            type: string
          description: Admin-managed allowlist of tool names permitted for this
            installation. When undefined, all tools from the app are permitted.
            When set, only listed tool names are available for agent
            configuration and execution.
        oauth_bindings:
          type: array
          items:
            $ref: "#/components/schemas/AppInstallationOAuthBinding"
          description: OAuth bindings created at install time via oauth_config
            provisioning. Maps collection identity (id or name) → OAuth provider
            ObjectId. Used by the runtime to resolve the correct OAuth provider
            without relying on manifest names.
        provider_bindings:
          type: array
          items:
            $ref: "#/components/schemas/AppInstallationProviderBinding"
          description: OAuth bindings created at install time via oauth_providers
            provisioning. Maps provider key → OAuth provider ObjectId. Multiple
            collections sharing the same provider all resolve to the same OAuth
            provider.
        access_control:
          $ref: "#/components/schemas/AppAccessControl"
          description: Per-installation override of the manifest's access_control policy.
            When set, takes precedence over the manifest value. When undefined,
            the manifest value (or 'all' default) applies.
        created_at:
          type: string
        updated_at:
          type: string
        manifest:
          anyOf:
            - $ref: "#/components/schemas/AppManifest"
            - type: "null"
        oauth_collection_ids:
          type: array
          items:
            type: string
      required:
        - created_at
        - id
        - manifest
        - project
        - updated_at
      additionalProperties: false
    OAuthClientType:
      type: string
      enum:
        - public
        - confidential
    OAuthGrantType:
      type: string
      enum:
        - authorization_code
        - refresh_token
        - urn:ietf:params:oauth:grant-type:device_code
    OAuthResponseType:
      type: string
      const: code
    OAuthTokenEndpointAuthMethod:
      type: string
      enum:
        - none
        - client_secret_post
        - client_secret_basic
    OAuthRegistrationSource:
      type: string
      enum:
        - admin
        - dynamic
    OAuthClientStatus:
      type: string
      enum:
        - active
        - disabled
    OAuthProjectBindingMode:
      type: string
      enum:
        - user_select
        - fixed
    OAuthGrantStatus:
      type: string
      enum:
        - active
        - revoked
        - expired
    OAuthGrantSortField:
      type: string
      enum:
        - granted_at
        - client_name
        - user_name
        - resource
        - last_used_at
        - expires_at
        - status
    OAuthGrantSortOrder:
      type: string
      enum:
        - asc
        - desc
    Partial_CreateOAuthProviderPayload:
      type: object
      properties:
        name:
          type: string
        display_name:
          type: string
        grant_type:
          type: string
          enum:
            - authorization_code
            - client_credentials
        authorization_endpoint:
          type: string
        token_endpoint:
          type: string

              description: Regional STS host label. `us1` is the global endpoint.
tags:
  - name: Token Service
    description: Security Token Service endpoints issue short-lived project, user,
      environment, service-account, and agent tokens.
  - name: Environments
    description: Environments configure model providers, endpoints, credentials,
      enabled models, and provider-specific execution settings. Use these
      endpoints to list, create, update, inspect, and operate model environments
      available to a project.
  - name: Prompt Templates
    description: Prompts are reusable template segments used by interactions. Use
      these endpoints to create draft prompts, update prompt content and
      schemas, inspect published versions, find interactions that use a prompt,
      and fork prompts across projects.
  - name: Interactions
    description: Interactions define executable GenAI tasks. Use these endpoints to
      create drafts, inspect and update definitions, publish immutable versions,
      fork interactions, resolve executable environment and model choices,
      execute interactions, and export interaction definitions.
  - name: Interaction Runs
    description: The `/runs` endpoints manage interaction execution records. Every
      interaction execution, whether synchronous, asynchronous,
      conversation-based, streamed, or batch, creates a run that tracks its
      input, output, status, token usage, execution source, and timing. Runs are
      the primary audit trail for interaction activity within a project. Use
      these endpoints to create runs, list and search execution history, compute
      facets, stream progress, send tool or user messages into active runs,
      clone runs, and replay previous executions.
  - name: Agent Runs
    description: Agent runs are long-running conversational workflow executions with
      stable IDs, message streams, artifacts, child workflow inspection,
      lifecycle controls, and searchable metadata.
  - name: Content Object Types
    description: Content object types define schema, layout, and metadata structure
      for content objects.
  - name: Objects
    description: Content objects represent documents, files, images, and extracted
      data stored in Vertesia Content. Use these endpoints to search and
      retrieve content records for downstream processing and retrieval
      workflows.
  - name: Collections
    description: Collections organize content objects into searchable groups.
      Collections can be static or dynamic and can carry ACLs, child
      collections, and shared-property synchronization rules.
  - name: Files
    description: File endpoints manage project-scoped object storage, including
      signed upload and download URLs, metadata updates, copies, and deletes.
  - name: Rendering
    description: Rendering endpoints convert markdown content or stored objects into
      rendered artifacts such as PDF and DOCX files through asynchronous
      workflows.
  - name: Bulk Operations
    description: Bulk Operation endpoints create, update, delete, or retag many
      content objects in a single request.
  - name: Commands
    description: Command endpoints control project embeddings, Elasticsearch
      indexing, and operational content maintenance flows such as synchronous
      migrations.
  - name: Data
    description: Data endpoints manage versioned project data stores, SQL schema
      evolution, imports, snapshots, queries, and dashboards.
  - name: Processes
    description: Process endpoints manage versioned process definitions, revisions,
      publishing, and rollback.
  - name: Tasks
    description: Task endpoints manage durable human tasks used by process runs and
      agent asks.
  - name: Workflow Definitions
    description: Workflow definitions describe reusable DSL workflows and their
      activity graph.
  - name: Workflow Rules
    description: Workflow rules bind named endpoints and execution defaults to
      workflow definitions so they can be triggered consistently.
  - name: Workflow Runs
    description: Workflow run endpoints start workflows, inspect execution state,
      stream updates, and apply runtime actions such as signaling or
      cancellation.
  - name: Accounts
    description: Account endpoints manage the current account, account membership,
      invites, onboarding state, and account-scoped integrations.
  - name: Projects
    description: Project endpoints manage project records, configuration,
      integrations, enabled plugins, and project-scoped app assets.
  - name: Audit Trail
    description: Audit Trail endpoints expose account and project audit events for
      administrative review and investigation.
  - name: Costs
    description: Cost endpoints expose billing analytics, model pricing, and
      run-level metering for project and account usage.
  - name: Users
    description: User endpoints retrieve, update, and delete account members within
      the current account context.
  - name: User Groups
    description: User Group endpoints manage account-level groups and their
      membership for access control and app visibility.
  - name: Roles
    description: Role endpoints expose the built-in Vertesia role catalog and the
      permissions granted by each role.
  - name: Access Control Entries
    description: Access Control Entry endpoints manage account-, project-, and
      app-level role assignments for users, groups, and API keys.
  - name: API Keys
    description: API Key endpoints manage project and account API credentials used
      to authenticate automation and external clients.
  - name: Apps
    description: App endpoints manage app manifests, project installations,
      installation settings, and installation-scoped tool visibility.
  - name: OAuth Providers
    description: OAuth Provider endpoints manage project-scoped OAuth providers and
      the associated authorization flows and token lifecycle.
  - name: OAuth Clients
    description: OAuth Client endpoints manage clients registered against the
      built-in OAuth server.
  - name: OAuth Grants
    description: OAuth Grant endpoints list granted OAuth access, inspect grant
      details, and revoke one or more OAuth grants.
  - name: Remote MCP Connections
    description: Remote MCP Connection endpoints manage OAuth discovery,
      authorization, connection status, and token access for third-party MCP
      tool collections installed through apps.

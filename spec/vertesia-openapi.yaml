          text: "#/components/schemas/EmbeddingsApiTextInput"
          image: "#/components/schemas/EmbeddingsApiImageInput"
          video: "#/components/schemas/EmbeddingsApiVideoInput"
          audio: "#/components/schemas/EmbeddingsApiAudioInput"
      required:
        - type
    EmbeddingsApiTextInput:
      type: object
      properties:
        type:
          type: string
          const: text
        text:
          type: string
        task_type:
          $ref: "#/components/schemas/EmbeddingTaskType"
        title:
          type: string
      required:
        - type
        - text
      additionalProperties: false
    EmbeddingTaskType:
      type: string
      enum:
        - query
        - document
      description: >-
        Semantic task type for embedding models. Drivers map these to provider-
        specific values (e.g. "RETRIEVAL_QUERY" for Vertex, "search_query" for
        Cohere).

        - "query"    — a search query to find relevant documents

        - "document" — a document to be indexed and retrieved
    EmbeddingsApiImageInput:
      type: object
      properties:
        type:
          type: string
          const: image
        source:
          $ref: "#/components/schemas/EmbeddingsApiSource"
      required:
        - type
        - source
      additionalProperties: false
    EmbeddingsApiSource:
      type: object
      properties:
        name:
          type: string
          description: Display name for the source (defaults to "embedding-input").
        mime_type:
          type: string
          description: MIME type of the binary content. Required for most providers.
        url:
          type: string
          description: |-
            Provider-native URL the driver may pass through directly:
            - gs:// or https://storage.googleapis.com/ for Vertex AI
            - s3:// or https://*.amazonaws.com for Bedrock
            - https:// for fetch fallback Mutually exclusive with base64.
        base64:
          type: string
          description: Base64-encoded bytes. Mutually exclusive with url.
      additionalProperties: false
    EmbeddingsApiVideoInput:
      type: object
      properties:
        type:
          type: string
          const: video
        source:
          $ref: "#/components/schemas/EmbeddingsApiSource"
        start_sec:
          type: number
        length_sec:
          type: number
        interval_sec:
          type: number
        use_fixed_length_sec:
          type: boolean
        min_clip_sec:
          type: number
        embedding_option:
          type: array
          items:
            type: string
            enum:
              - visual-text
              - visual-image
              - audio
      required:
        - type
        - source
      additionalProperties: false
    EmbeddingsApiAudioInput:

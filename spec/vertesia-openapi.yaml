          type: string
        context:
          $ref: "#/components/schemas/ProcessContextDefinition"
        nodes:
          $ref: "#/components/schemas/NodeDefinitionMap"
        metadata:
          $ref: "#/components/schemas/ProcessDefinitionMetadata"
      required:
        - format_version
        - process
        - initial
        - context
        - nodes
      additionalProperties: false
    ProcessDefinitionFormatVersion:
      type: number
      const: 1
    ProcessContextDefinition:
      type: object
      properties:
        schema:
          $ref: "#/components/schemas/JSONSchema"
        initial:
          type: object
          additionalProperties: true
      required:
        - schema
        - initial
      additionalProperties: false
    JSONSchema:
      type: object
      properties:
        type: {}
        description:
          type: string
        properties:
          $ref: "#/components/schemas/JSONSchemaProperties"
        items:
          $ref: "#/components/schemas/JSONSchema"
        format:
          type: string
        editor: {}
        default: {}
        additionalProperties:
          anyOf:
            - type: boolean
            - $ref: "#/components/schemas/JSONSchema"
        required:
          type: array
          items:
            type: string
    JSONSchemaProperties:
      type: object
      additionalProperties:
        $ref: "#/components/schemas/JSONSchema"
    NodeDefinitionMap:
      type: object
      additionalProperties:
        $ref: "#/components/schemas/NodeDefinition"
    NodeDefinition:
      type: object
      properties:
        type:
          $ref: "#/components/schemas/ProcessNodeType"
        tool:
          type: string
        interaction:
          type: string
        process:
          type: string
        process_definition:
          $ref: "#/components/schemas/ProcessDefinitionBody"
        process_version:
          type: number
        run_type:
          $ref: "#/components/schemas/ProcessNodeRunType"
        returns:
          $ref: "#/components/schemas/ProcessNodeReturnsDefinition"
        result_schema:
          $ref: "#/components/schemas/JSONSchema"
          description: Optional JSON Schema for structured output produced by interaction
            and agent nodes. When omitted, the process engine derives a schema
            from `writes` and the process context schema.
        prompt:
          type: string
        input:
          type: object
          additionalProperties: true
        config:
          type: object
          additionalProperties: true
        title:
          type: string
        description:
          type: string
        human_description:
          type: string
          description: End-user-facing explanation of what this node does. Authored by the
            process designer (often an LLM) in plain language — one or two
            sentences — and rendered in run observability so a human reading the
            run can understand why this node exists without reading the config.
            Distinct from `description`, which is developer-facing.
        writes:
          type: array
          items:
            type: string
        skippable:
          type: boolean
        max_retries:
          type: number
        transitions:
          type: array
          items:
            $ref: "#/components/schemas/TransitionDefinition"
        tools:
          type: array
          items:
            type: string
        model:
          type: string
          description: Model id override for this node. If unset, falls back to the
            process run's `config.model`, then to the project's default. Useful
            when a specific node needs heavier reasoning (e.g. Opus for legal
            flagging) while the rest of the process uses a cheaper default.
        task:
          $ref: "#/components/schemas/HumanTaskDefinition"
        foreach:
          type: string
        as:
          type: string
        item_id:
          type: string
        node:
          $ref: "#/components/schemas/NodeDefinition"
        max_concurrency:
          type: number
        collect:
          anyOf:
            - type: string
            - $ref: "#/components/schemas/ParallelCollectDefinition"
        failure_policy:
          $ref: "#/components/schemas/ParallelFailurePolicy"
        join:
          $ref: "#/components/schemas/BranchJoinPolicy"
        branches:
          type: array
          items:
            oneOf:
              - $ref: "#/components/schemas/BranchDefinition"
              - $ref: "#/components/schemas/BranchNodeBranchDefinition"
        metadata:
          $ref: "#/components/schemas/ProcessDefinitionMetadata"
      required:
        - type
      additionalProperties: false
    ProcessNodeType:
      type: string
      enum:
        - tool
        - interaction
        - agent
        - process
        - human_task
        - foreach
        - branch
        - condition
        - final
    ProcessNodeRunType:
      type: string
      enum:
        - supervised
        - programmatic
    ProcessNodeReturnsDefinition:
      type: object
      properties:
        from:
          type: string
          description: Path to read from the completed child process state. Use
            `context.foo` for child context values or `state.sequence` for
            process-state fields. If omitted, the child context is used as the
            node output.
        context:
          type: array
          items:
            type: string
          description: Select specific fields from the completed child process context.
            Ignored when `from` is set.
      additionalProperties: false
    TransitionDefinition:
      type: object
      properties:
        to:
          type: string
        guard:
          $ref: "#/components/schemas/JsonLogicRule"
        trigger:
          $ref: "#/components/schemas/TransitionTrigger"
        label:
          type: string
        metadata:
          $ref: "#/components/schemas/ProcessDefinitionMetadata"
      required:
        - to
      additionalProperties: false
    JsonLogicRule:
      type: object
      additionalProperties: true
    TransitionTrigger:
      type: string
      enum:
        - auto
        - agent
        - user
    ProcessDefinitionMetadata:
      type: object
      additionalProperties: true
    HumanTaskDefinition:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        assignee:
          type: string
          description: Who owns the task. Either a group reference (`group:<name>`) or a
            concrete user id. Leave unset to make the task available to anyone
            who can see the inbox. `role:<name>` is not supported — use
            `group:<name>` instead.
        fields:
          type: array
          items:
            $ref: "#/components/schemas/TaskField"
      required:
        - title
        - fields
      additionalProperties: false
    TaskField:
      type: object
      properties:
        name:
          type: string
        type:
          $ref: "#/components/schemas/TaskFieldType"
        required:
          type: boolean
        label:
          type: string
        options:
          type: array
          items:
            type: string
        default: {}
      required:
        - name
        - type
      additionalProperties: false
    TaskFieldType:
      type: string
      enum:
        - string
        - number
        - boolean
        - select
        - text
    ParallelCollectDefinition:
      type: object
      properties:
        into:
          type: string
          description: Context key that receives the collected results.
        mode:
          $ref: "#/components/schemas/ParallelCollectMode"
        include:
          type: array
          items:
            $ref: "#/components/schemas/ParallelCollectField"
          description: "Fields to include in each collected item. Defaults to the
            operational envelope: status, index, item_id, output, error, and
            child_run_id."
      required:
        - into
      additionalProperties: false
    ParallelCollectMode:
      type: string
      const: array
    ParallelCollectField:
      type: string
      enum:
        - status
        - index
        - item
        - item_id
        - branch_id
        - branch_title
        - output
        - context_update
        - error
        - child_run_id
        - child_workflow_id
        - child_workflow_run_id
    ParallelFailurePolicy:
      type: string
      enum:
        - fail_fast
        - collect_errors
    BranchJoinPolicy:
      type: string
      const: all
    BranchDefinition:
      type: object
      properties:
        to:
          type: string
        when:
          $ref: "#/components/schemas/JsonLogicRule"
        default:
          type: boolean
        metadata:
          $ref: "#/components/schemas/ProcessDefinitionMetadata"
      required:
        - to
      additionalProperties: false
    BranchNodeBranchDefinition:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        node:
          $ref: "#/components/schemas/NodeDefinition"
        metadata:
          $ref: "#/components/schemas/ProcessDefinitionMetadata"
      required:
        - id
        - node
      additionalProperties: false
    CompositeAppCardOverrides:
      type: object
      properties:
        visible:
          type: boolean
          description: "Whether to show the CompositeApp card in App Portal (default:
            false)"
        label:
          type: string
          description: 'Override the card label (default: "Composite App")'
        description:
          type: string
          description: Override the card description
        icon:
          type: string
          description: Override the card icon (Lucide icon name or SVG content string)
        color:
          type: string
          description: Override the card color (e.g., "blue", "red", "purple")
      additionalProperties: false
      description: Card display overrides for the CompositeApp in the App Portal.
        Similar to AppManifest display properties, but specific to the
        CompositeApp card. Allows customers to customize the app portal card
        (not otherwise possible if using a shared, Vertesia-managed manifest
        across accounts).
    CompositeAppLogoOverrides:
      type: object
      properties:
        lightModeUrl:
          type: string
          description: URL for light mode logo (overrides default Vertesia logo)
        darkModeUrl:
          type: string
          description: URL for dark mode logo (overrides default Vertesia logo)
        hideFooterLogo:
          type: boolean
          description: Whether to hide the Vertesia footer logo in the sidebar when header
            logo is overridden (defaults to false)
      additionalProperties: false
      description: Logo overrides for the CompositeApp shell header. When provided,
        these URLs replace the default Vertesia logo.
    CompositeAppMessageOverrides:
      type: object
      properties:
        text:
          type: string
          description: Message text to display
        visible:
          type: boolean
          description: Whether the message is visible (defaults to true)
        style:
          $ref: "#/components/schemas/CompositeAppMessageStyle"
          description: Text color style. Uses semantic colors
      additionalProperties: false
    CompositeAppMessageStyle:
      type: string
      enum:
        - foreground
        - info
        - success
        - attention
        - destructive
      description: Message banner overrides for the shell header.
    CompositeAppSwitchersOverrides:
      type: object
      properties:
        hideOrganization:
          type: boolean
          description: Whether to hide the organization switcher (defaults to false)
        hideProject:
          type: boolean
          description: Whether to hide the project switcher (defaults to false)
      additionalProperties: false
      description: Switcher visibility overrides for the CompositeApp header.
    CompositeAppSidebarOverrides:
      type: object
      properties:
        hideSectionHeaders:
          type: boolean
          description: Whether to hide section title headers in the sidebar (defaults to
            false)
        autoCollapse:
          type: boolean
          description: Whether menu items auto-collapse when navigating (accordion
            behavior). When false, all items stay expanded. Defaults to true.
        autoCollapseSettings:
          type: boolean
          description: Whether settings section items auto-collapse when navigating.
            Independent of autoCollapse which handles all other items. Defaults
            to true.
        autoCollapseFooter:
          type: boolean
          description: Whether footer section items auto-collapse when navigating.
            Independent of autoCollapse which handles all other items. Defaults
            to true.
      additionalProperties: false
      description: Sidebar display overrides for the CompositeApp.
    CompositeAppHeaderOverrides:
      type: object
      properties:
        hideAppPortal:
          type: boolean
          description: Whether to hide the App Portal button (defaults to false)
        hideDocs:
          type: boolean
          description: Whether to hide the Docs button (defaults to false)
        hideHelp:
          type: boolean
          description: Whether to hide the Help button (defaults to false)
      additionalProperties: false
      description: Header button visibility overrides for the CompositeApp header.
    CompositeAppUserMenuOverrides:
      type: object
      properties:
        hidden:
          type: boolean
          description: Whether to hide the User Menu (defaults to false)
      additionalProperties: false
      description: User menu overrides for the CompositeApp.
    CompositeAppHeaderItem:
      type: object
      properties:
        id:
          type: string
          description: Stable unique identifier. Built-ins use their kind as id (e.g.
            "app_portal").
        kind:
          $ref: "#/components/schemas/CompositeAppHeaderItemKind"
          description: Item kind. `custom` for user-added buttons; otherwise one of the
            four built-ins.
        label:
          type: string
          description: Display label, used as the button tooltip / accessible name.
        icon:
          type: string
          description: Lucide icon name or SVG content string. Ignored for `user_menu`.
        href:
          type: string
          description: Destination route ("/...") or external URL. Ignored for `user_menu`.
        target:
          $ref: "#/components/schemas/CompositeAppHeaderItemTarget"
          description: Where to open the link (defaults to "_self"). Ignored for
            `user_menu`.
        hidden:
          type: boolean
          description: When true, this item is hidden from the header.
        permissions:
          $ref: "#/components/schemas/CompositeAppNavItemPermissions"
          description: Optional access control settings for this header item.
      required:
        - id
        - kind
        - label
      additionalProperties: false
      description: >-
        A single button in the CompositeApp header bar.


        Unlike sidebar nav-items, header items are free-form and not tied to an
        installed app: each is a labelled, icon-bearing button linking to a
        route or external URL. The `user_menu` item is special — it renders the
        account dropdown, so its `icon`, `href`, and `target` are ignored.
    CompositeAppHeaderItemKind:
      type: string
      enum:
        - app_portal
        - docs
        - help
        - user_menu
        - custom
      description: Discriminator for a header item. The four built-ins (`app_portal`,
        `docs`, `help`, `user_menu`) seed the default header and cannot be
        deleted (only hidden/customized); `custom` items are fully user-defined
        buttons.
    CompositeAppHeaderItemTarget:
      type: string
      enum:
        - _self
        - _blank
      description: Where a header link opens.
    CompositeAppNavItemPermissions:
      type: object
      properties:
        groupsAllowed:
          type: array
          items:
            type: string
          description: Group IDs whose members can see this item.
        usersAllowed:
          type: array
          items:
            type: string
          description: User IDs who can see this item.
        rolesAllowed:
          type: array
          items:
            type: string
          description: SystemRoles values (e.g. "developer", "manager") whose holders can
            see this item.
      additionalProperties: false
      description: >-
        Access control settings for a composite app nav item.


        If any of `groupsAllowed`, `usersAllowed`, or `rolesAllowed` are set,
        access is granted when the user matches ANY list (OR logic). All
        empty/absent means visible to everyone. Admin users bypass all checks.
    CompositeAppThemeOverrides:
      type: object
      properties:
        disableDarkMode:
          type: boolean
          description: When true, forces light mode and disables dark mode (defaults to
            false)
      additionalProperties: false
      description: Theme overrides for the CompositeApp.
    CompositeAppHomePlugin:
      type: object
      properties:
        appName:
          type: string
          description: The app name to use as the home page
        appRoute:
          type: string
          description: Optional route within the app (e.g. "/dashboard"). Defaults to "/"
      required:
        - appName
      additionalProperties: false
    CompositeAppEntry:
      type: object
      properties:
        appName:
          type: string
          description: App installation name (must match an installed app)
      required:
        - appName
      additionalProperties: false
      description: Configuration entry for an individual app in the CompositeApp
        shell. References an app installation by name.
    CompositeAppMenuSection:
      type: object
      properties:
        id:
          type: string
          description: Stable unique identifier
        label:
          type: string
          description: Section heading label
        hidden:
          type: boolean
          description: When true, this section and its items are hidden from the sidebar
        items:
          type: array
          items:
            $ref: "#/components/schemas/CompositeAppMenuNavItem"
          description: Ordered nav-items within this section
      required:
        - id
        - label
        - items
      additionalProperties: false
      description: A top-level section heading in the sidebar menu. Sections are
        always at root level and contain nav-items.
    CompositeAppMenuNavItem:
      type: object
      properties:
        id:
          type: string
          description: Stable unique identifier
        label:
          type: string
          description: Display label shown in the sidebar
        icon:
          type: string
          description: Lucide icon name or SVG content string
        appName:
          type: string
          description: Which installed app this item routes to
        route:
          type: string
          description: Route path within the app (e.g. "/" or "/dashboard")
        hidden:
          type: boolean
          description: When true, this item is hidden from the sidebar
        description:
          type:
            - string
            - "null"
          description: Optional description for dashboard cards and summary views. `null`
            = user explicitly cleared it (show no description, skip fallback).
            `undefined` / absent = no override (fall back to manifest
            description).
        hideFromDashboard:
          type: boolean
          description: When true, this item is excluded from the Composite App dashboard
            cards
        permissions:
          $ref: "#/components/schemas/CompositeAppNavItemPermissions"
          description: Optional access control settings for this nav item
        children:
          type: array
          items:
            $ref: "#/components/schemas/CompositeAppMenuNavItem"
          description: Ordered child nav-items
      required:
        - id
        - label
      additionalProperties: false
      description: 'A navigable item in the sidebar menu. An "app" is just a nav-item
        with `appName` + `route: "/"` that has children. Nav-items carry their
        own `appName` for routing, independent of position in the tree.'
    Partial_Omit_CompositeAppConfig_id_project:
      type: object
      properties:
        card:
          $ref: "#/components/schemas/CompositeAppCardOverrides"
          description: Card display overrides (includes visibility)
        logo:
          $ref: "#/components/schemas/CompositeAppLogoOverrides"
          description: Optional logo overrides (replaces default Vertesia logo)
        message:
          $ref: "#/components/schemas/CompositeAppMessageOverrides"
          description: Optional message banner overrides
        switchers:
          $ref: "#/components/schemas/CompositeAppSwitchersOverrides"
          description: Optional switcher visibility overrides
        sidebar:
          $ref: "#/components/schemas/CompositeAppSidebarOverrides"
          description: Optional sidebar display overrides
        header:
          $ref: "#/components/schemas/CompositeAppHeaderOverrides"
          deprecated: true
          x-deprecated-message: >-
            Use `headerMenu` instead. Optional header button visibility
            overrides.

            Still read to seed `headerMenu` defaults for configs saved before
            the header menu existed.
          description: >-
            Deprecated: Use `headerMenu` instead. Optional header button
            visibility overrides.

            Still read to seed `headerMenu` defaults for configs saved before
            the header menu existed.
        userMenu:
          $ref: "#/components/schemas/CompositeAppUserMenuOverrides"
          deprecated: true
          x-deprecated-message: >-
            Use the `user_menu` item in `headerMenu` instead. Optional user menu
            overrides.

            Still read to seed `headerMenu` defaults for configs saved before
            the header menu existed.
          description: >-
            Deprecated: Use the `user_menu` item in `headerMenu` instead.
            Optional user menu overrides.

            Still read to seed `headerMenu` defaults for configs saved before
            the header menu existed.
        headerMenu:
          type: array
          items:
            $ref: "#/components/schemas/CompositeAppHeaderItem"
          description: Optional free-form header menu. When present, the header renders
            from this ordered list instead of the legacy `header`/`userMenu`
            flags. Built-in items (App Portal, Docs, Help, User Menu) can be
            hidden/relabeled/re-icon'd/redirected; custom items are arbitrary
            buttons.
        theme:
          $ref: "#/components/schemas/CompositeAppThemeOverrides"
          description: Optional theme overrides (e.g. disable dark mode)
        homePlugin:
          anyOf:
            - $ref: "#/components/schemas/CompositeAppHomePlugin"
            - type: "null"
          description: Optional home page override. When set, redirects "/" to the
            specified app route instead of the dashboard. Send null to unset.
        apps:
          type: array
          items:
            $ref: "#/components/schemas/CompositeAppEntry"
          description: List of apps to include in the CompositeApp (used for installation
            tracking and fallback sidebar)
        menu:
          type: array
          items:
            $ref: "#/components/schemas/CompositeAppMenuSection"
          description: Optional sidebar menu. When present, the sidebar renders from this
            instead of the apps-based pipeline. Top-level array is sections;
            each section contains nav-items.
      additionalProperties: false

        name:
          type: string
          description: Human-readable name or title
        description:
          type: string
          description: Optional detailed description of the object
        tags:
          type: array
          items:
            type: string
          description: Tags for organization
        updated_by:
          type: string
          description: Identifier of the user who last modified the object
        created_by:
          type: string
          description: Identifier of the user who created the object
        created_at:
          type: string
          description: ISO timestamp of when the object was created
        updated_at:
          type: string
          description: ISO timestamp of when the object was last updated
        store_id:
          type: string
          description: Parent data store ID
        status:
          $ref: "#/components/schemas/DashboardStatus"
          description: Current status
        panel_count:
          type: number
          description: Number of panels (deprecated, kept for backwards compat)
        query_count:
          type: number
          description: Number of queries (deprecated, kept for backwards compat)
        last_rendered_at:
          type: string
          description: Last render timestamp
      required:
        - created_at
        - created_by
        - id
        - name
        - panel_count
        - query_count
        - status
        - store_id
        - tags
        - updated_at
        - updated_by
      additionalProperties: false
      description: Summary view of a dashboard (for listings).
    DashboardStatus:
      type: string
      enum:
        - active
        - archived
      description: Dashboard lifecycle status.
    DashboardQuery:
      type: object
      properties:
        name:
          type: string
          description: Query name (used as data source reference in Vega specs)
        sql:
          type: string
          description: SQL query (SELECT only). Can include {{param_name}} placeholders
            for dynamic values.
        description:
          type: string
          description: Human-readable description
        limit:
          type: number
          description: Maximum rows to return
        parameters:
          $ref: "#/components/schemas/StringValueMap"
          description: Default values for SQL parameters. Keys are parameter names
            (without braces).
      required:
        - name
        - sql
      additionalProperties: false
      description: Named SQL query that maps to a Vega data source. Supports
        parameterized SQL with {{param_name}} placeholders.
    DashboardPanel:
      type: object
      properties:
        id:
          type: string
          description: Panel ID (auto-generated if not provided)
        title:
          type: string
          description: Panel title
        spec:
          type: object
          additionalProperties: true
          description: Vega or Vega-Lite specification
        vegaLite:
          type: boolean
          description: "Whether spec is Vega-Lite (default: true)"
        dataSources:
          type: array
          items:
            type: string
          description: Query names that populate this panel's data sources
        position:

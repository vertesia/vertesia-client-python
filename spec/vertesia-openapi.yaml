          type: string
          description: Redis channel to publish streaming chunks to
        workstream_id:
          type: string
          description: Optional workstream ID for multi-workstream agents
      required:
        - redis_channel
      additionalProperties: false
      description: Streaming-specific options (only needed when stream=true)

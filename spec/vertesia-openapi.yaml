        cellWidth:
          type: number
          description: "Width of each cell in pixels (default: 600)"
        cellHeight:
          type: number
          description: "Height of each cell in pixels (default: 400)"
        padding:
          type: number
          description: "Padding between cells in pixels (default: 20)"
      required:
        - columns
        - cellWidth
        - cellHeight
        - padding
      additionalProperties: false
      description: Dashboard layout configuration.
    MarkdownRenditionFormat:
      type: string
      enum:
        - docx
        - pdf
    PdfRenderingMetadata:
      type: object

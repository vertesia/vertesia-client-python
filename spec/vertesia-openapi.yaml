    AsyncCompletionOptions:
      type: object
      properties:
        run_id:
          type: string
          description: Workflow run ID for message context
        stream:
          type: boolean
          description: Whether to stream chunks to Redis
        streaming:
          $ref: "#/components/schemas/StreamingOptions"
          description: Streaming-specific options (required if stream=true)
        task_token:
          type: string
          description: Temporal task token for async activity completion (base64url
            encoded). When provided, Studio will complete the activity after
            execution finishes, allowing the worker to release the activity slot
            immediately.
        activity_id:
          type: string
          description: Activity ID for idempotency metadata when storing conversation.
            Required when task_token is provided.
        current_state:
          $ref: "#/components/schemas/ConversationState"
          description: Current conversation state to merge with execution result. Studio
            will store the conversation and complete the activity with merged
            state. Required when task_token is provided.
        heartbeat_interval_ms:
          type: number
          description: "Interval in milliseconds for sending heartbeats to Temporal during
            streaming. When provided, Studio will send periodic heartbeats to
            keep the activity alive. Recommended: 10000 (10 seconds). Activity
            heartbeat timeout should be ~3x this value."
        telemetry:
          $ref: "#/components/schemas/StreamingTelemetryContext"
          description: Telemetry context for sending LlmCallEvent after streaming
            completes. Studio will use this to send token usage telemetry since
            the activity exits before the response is available in async
            completion mode.
        result_storage:
          $ref: "#/components/schemas/ResultStorageOptions"
          description: Storage options for inference result. When provided, Studio will
            store the result to the specified path after inference completes
            (before completing the Temporal activity).
      required:
        - run_id
      additionalProperties: false
      description: Options for async completion and/or streaming LLM responses

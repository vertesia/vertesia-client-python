openapi: 3.1.0
info:
  title: Vertesia API
  version: 1.5.0-dev
  description: The Vertesia API provides project-scoped access to interaction
    execution and content workflows. Use it to run interactions, inspect
    execution history, stream run progress, replay previous executions, and
    search content objects and collections. Authenticate requests with a bearer
    token, or use the official `@vertesia/client` package for typed access from
    Node.js applications.
  contact:
    name: Vertesia
    url: https://vertesiahq.com/
  license:
    name: Apache-2.0
    identifier: Apache-2.0
  x-scalar-sdk-installation:
    - lang: Node
      description: "Install the **Vertesia Client** from npm:"
      source: npm install @vertesia/client
servers:
  - url: https://api.{region}.vertesia.io/api/v1
    description: Vertesia API
    variables:
      region:
        default: us1
        enum:
          - us1
          - eu1
          - jp1
        description: Regional API host label. `us1` is the global endpoint.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
    OpenID:
      type: openIdConnect
      openIdConnectUrl: https://api.us1.vertesia.io/.well-known/openid-configuration
  schemas:
    ProjectRefArray:
      type: array
      items:
        $ref: "#/components/schemas/ProjectRef"
    Project:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        namespace:
          type: string
        description:
          type: string
        account:
          type: string
        configuration:
          $ref: "#/components/schemas/ProjectConfiguration"
        integrations:
          type: object
          additionalProperties: true
        plugins:
          type: array
          items:
            type: string
        created_by:
          type: string
        updated_by:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - name
        - namespace
        - account
        - configuration
        - plugins
        - created_by
        - updated_by
        - created_at
        - updated_at
      additionalProperties: false
    ICreateProjectPayload:
      type: object
      properties:
        name:
          type: string
        namespace:
          type: string
        description:
          type: string
        auto_config:
          type: boolean
      required:
        - name
        - namespace
      additionalProperties: false
    Partial_Project:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        namespace:
          type: string
        description:
          type: string
        account:
          type: string
        configuration:
          $ref: "#/components/schemas/ProjectConfiguration"
        integrations:
          type: object
          additionalProperties: true
        plugins:
          type: array
          items:
            type: string
        created_by:
          type: string
        updated_by:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      additionalProperties: false
    DeleteByIdResult:
      type: object
      properties:
        id:
          type: string
      required:
        - id
      additionalProperties: false
    ProjectConfiguration:
      type: object
      properties:
        human_context:
          type: string
        defaults:
          $ref: "#/components/schemas/ProjectModelDefaults"
        default_visibility:
          $ref: "#/components/schemas/ResourceVisibility"
        sync_content_properties:
          type: boolean
        embeddings:
          type: object
          properties:
            text:
              $ref: "#/components/schemas/ProjectConfigurationEmbedding"
            image:
              $ref: "#/components/schemas/ProjectConfigurationEmbedding"
            properties:
              $ref: "#/components/schemas/ProjectConfigurationEmbedding"
          additionalProperties: false
        datacenter:
          type: string
        storage_bucket:
          type: string
        agent_streaming_enabled:
          type: boolean
          description: Enable real-time streaming of agent LLM responses to clients. When
            enabled, LLM responses are streamed chunk-by-chunk via Redis
            pub/sub. Defaults to true if not specified.
        indexing:
          type: object
          properties:
            enabled:
              type: boolean
              description: Enable indexing for content objects in this project. When enabled,
                content changes trigger indexing workflows. Defaults to true -
                indexing is always on when ES infrastructure is available.
            search_tier:
              $ref: "#/components/schemas/ProjectSearchTier"
              description: Search tier for this project. standard uses the regional hosted
                Elasticsearch deployment. performance uses the regional
                serverless Elasticsearch project. Defaults to standard when
                omitted.
            backend:
              $ref: "#/components/schemas/ElasticsearchBackend"
              description: Elasticsearch backend override for this project. Prefer search_tier
                for project configuration unless an explicit backend override is
                needed.
          additionalProperties: false
          description: Indexing configuration for this project. Controls whether indexing
            and querying are enabled at the project level.
        intake:
          $ref: "#/components/schemas/ProjectIntakeConfiguration"
          description: Standard content intake behavior.
        main_language:
          type: string
          description: >-
            Primary language for full-text search analysis. ISO 639-1 code
            (e.g., 'en', 'fr', 'ja', 'de'). Determines which Elasticsearch
            analyzer is used for the text field. Defaults to 'en'
            (English/standard analyzer).


            Changing this value requires a full reindex to take effect.
        browser_use:
          $ref: "#/components/schemas/BrowserUseProjectConfiguration"
          description: Project defaults and caps for browser_use agent workstreams.
        pdf_template_object_id:
          type: string
          description: Object ID of a content object containing a custom LaTeX template
            (.latex file) to use as the branded PDF template. When set, "Export
            as Branded PDF" uses this template instead of the built-in Vertesia
            default template.
      required:
        - embeddings
      additionalProperties: false
    Partial_ProjectConfiguration:
      type: object
      properties:
        human_context:
          type: string
        defaults:
          $ref: "#/components/schemas/ProjectModelDefaults"
        default_visibility:
          $ref: "#/components/schemas/ResourceVisibility"
        sync_content_properties:
          type: boolean
        embeddings:
          type: object
          properties:
            text:
              $ref: "#/components/schemas/ProjectConfigurationEmbedding"
            image:
              $ref: "#/components/schemas/ProjectConfigurationEmbedding"
            properties:
              $ref: "#/components/schemas/ProjectConfigurationEmbedding"
          additionalProperties: false
        datacenter:
          type: string
        storage_bucket:
          type: string
        agent_streaming_enabled:
          type: boolean
          description: Enable real-time streaming of agent LLM responses to clients. When
            enabled, LLM responses are streamed chunk-by-chunk via Redis
            pub/sub. Defaults to true if not specified.
        indexing:
          type: object
          properties:
            enabled:
              type: boolean
              description: Enable indexing for content objects in this project. When enabled,
                content changes trigger indexing workflows. Defaults to true -
                indexing is always on when ES infrastructure is available.
            search_tier:
              $ref: "#/components/schemas/ProjectSearchTier"
              description: Search tier for this project. standard uses the regional hosted
                Elasticsearch deployment. performance uses the regional
                serverless Elasticsearch project. Defaults to standard when
                omitted.
            backend:
              $ref: "#/components/schemas/ElasticsearchBackend"
              description: Elasticsearch backend override for this project. Prefer search_tier
                for project configuration unless an explicit backend override is
                needed.
          additionalProperties: false
          description: Indexing configuration for this project. Controls whether indexing
            and querying are enabled at the project level.
        intake:
          $ref: "#/components/schemas/ProjectIntakeConfiguration"
          description: Standard content intake behavior.
        main_language:
          type: string
          description: >-
            Primary language for full-text search analysis. ISO 639-1 code
            (e.g., 'en', 'fr', 'ja', 'de'). Determines which Elasticsearch
            analyzer is used for the text field. Defaults to 'en'
            (English/standard analyzer).


            Changing this value requires a full reindex to take effect.
        browser_use:
          $ref: "#/components/schemas/BrowserUseProjectConfiguration"
          description: Project defaults and caps for browser_use agent workstreams.
        pdf_template_object_id:
          type: string
          description: Object ID of a content object containing a custom LaTeX template
            (.latex file) to use as the branded PDF template. When set, "Export
            as Branded PDF" uses this template instead of the built-in Vertesia
            default template.
      additionalProperties: false
    ProjectIntegrationConfigResponse:
      type: object
      discriminator:
        propertyName: integration
        mapping:
          gladia: "#/components/schemas/GladiaConfiguration"
          github: "#/components/schemas/GithubConfiguration"
          aws: "#/components/schemas/AwsConfiguration"
          magic_pdf: "#/components/schemas/MagicPdfConfiguration"
          serper: "#/components/schemas/SerperConfiguration"
          exa: "#/components/schemas/ExaConfiguration"
          linkup: "#/components/schemas/LinkupConfiguration"
          resend: "#/components/schemas/ResendConfiguration"
          ask_user_webhook: "#/components/schemas/AskUserWebhookConfiguration"
      required:
        - integration
      oneOf:
        - $ref: "#/components/schemas/GladiaConfiguration"
        - $ref: "#/components/schemas/GithubConfiguration"
        - $ref: "#/components/schemas/AwsConfiguration"
        - $ref: "#/components/schemas/MagicPdfConfiguration"
        - $ref: "#/components/schemas/SerperConfiguration"
        - $ref: "#/components/schemas/ExaConfiguration"
        - $ref: "#/components/schemas/LinkupConfiguration"
        - $ref: "#/components/schemas/ResendConfiguration"
        - $ref: "#/components/schemas/AskUserWebhookConfiguration"
    ProjectIntegrationConfigRequest:
      type: object
      discriminator:
        propertyName: integration
        mapping:
          gladia: "#/components/schemas/GladiaConfigurationInput"
          github: "#/components/schemas/GithubConfigurationInput"
          aws: "#/components/schemas/AwsConfiguration"
          magic_pdf: "#/components/schemas/MagicPdfConfiguration"
          serper: "#/components/schemas/SerperConfigurationInput"
          exa: "#/components/schemas/ExaConfigurationInput"
          linkup: "#/components/schemas/LinkupConfigurationInput"
          resend: "#/components/schemas/ResendConfigurationInput"
          ask_user_webhook: "#/components/schemas/AskUserWebhookConfigurationInput"
      required:
        - integration
      oneOf:
        - $ref: "#/components/schemas/GladiaConfigurationInput"
        - $ref: "#/components/schemas/GithubConfigurationInput"
        - $ref: "#/components/schemas/AwsConfiguration"
        - $ref: "#/components/schemas/MagicPdfConfiguration"
        - $ref: "#/components/schemas/SerperConfigurationInput"
        - $ref: "#/components/schemas/ExaConfigurationInput"
        - $ref: "#/components/schemas/LinkupConfigurationInput"
        - $ref: "#/components/schemas/ResendConfigurationInput"
        - $ref: "#/components/schemas/AskUserWebhookConfigurationInput"
    ProjectIntegrationListResponse:
      type: object
      properties:
        integrations:
          type: array
          items:
            $ref: "#/components/schemas/ProjectIntegrationListEntry"
      required:
        - integrations
      additionalProperties: false
    CountResult:
      type: object
      properties:
        count:
          type: number
      required:
        - count
      additionalProperties: false
    ProjectPluginsUpdatePayload:
      type: object
      properties:
        plugins:
          type: array
          items:
            type: string
      required:
        - plugins
      additionalProperties: false
    ProjectToolInfoArray:
      type: array
      items:
        $ref: "#/components/schemas/ProjectToolInfo"
    ProjectToolInfo:
      type: object
      properties:
        tool_name:
          type: string
          description: The tool name
        tool_description:
          type: string
          description: Optional tool description
        app_name:
          type: string
          description: The app name that provides this tool
        app_install_id:
          type: string
          description: The app installation ID
        settings:
          type: object
          additionalProperties: true
          description: "The app installation settings. Only included for agent tokens, not
            user tokens (security: may contain API keys)."
      required:
        - tool_name
        - app_name
        - app_install_id
      additionalProperties: false
      description: Information about a tool and its associated app installation. Used
        to look up which app provides a specific tool.
    InCodeTypeDefinitionArray:
      type: array
      items:
        $ref: "#/components/schemas/InCodeTypeDefinition"
    InCodeTypeDefinition:
      $ref: "#/components/schemas/Pick_ContentObjectTypeItem_id_name_description_tags\
        _object_schema_table_layout_is_chunkable_strict_mode"
    RenderingTemplateDefinitionRefArray:
      type: array
      items:
        $ref: "#/components/schemas/RenderingTemplateDefinitionRef"
    RenderingTemplateDefinition:
      type: object
      properties:
        id:
          type: string
          description: 'Unique template id: "collection:name"'
        name:
          type: string
          description: Unique template name (kebab-case)
        title:
          type: string
          description: Display title
        description:
          type: string
          description: Short description
        type:
          type: string
          enum:
            - presentation
            - document
          description: Template type
        tags:
          type: array
          items:
            type: string
          description: Tags for categorization
        assets:
          type: array
          items:
            type: string
          description: Absolute paths to asset files
        instructions:
          type: string
          description: The template instructions (markdown)
      required:
        - id
        - name
        - description
        - type
        - assets
        - instructions
      additionalProperties: false
    InCodeProcessDefinitionArray:
      type: array
      items:
        $ref: "#/components/schemas/InCodeProcessDefinition"
    InCodeProcessDefinition:
      type: object
      properties:
        id:
          type: string
          description: Process identifier exposed by an app package. App-local ids are
            normalized by Studio to `app:<app-name>:<id>` when returned to
            callers.
        name:
          type: string
          description: Human-readable or app-local process name.
        title:
          type: string
        description:
          type: string
        tags:
          type: array
          items:
            type: string
        definition:
          $ref: "#/components/schemas/ProcessDefinitionBody"
      required:
        - id
        - name
        - definition
      additionalProperties: false
    CompositeAppConfig:
      type: object
      properties:
        id:
          type: string
          description: The unique identifier for this CompositeApp configuration Undefined
            if the configuration doesn't exists yet.
        project:
          type: string
          description: The project this CompositeApp belongs to
        card:
          $ref: "#/components/schemas/CompositeAppCardOverrides"
          description: Card display overrides (includes visibility)
        logo:
          $ref: "#/components/schemas/CompositeAppLogoOverrides"
          description: Optional logo overrides (replaces default Vertesia logo)
        message:
          $ref: "#/components/schemas/CompositeAppMessageOverrides"
          description: Optional message banner overrides
        switchers:
          $ref: "#/components/schemas/CompositeAppSwitchersOverrides"
          description: Optional switcher visibility overrides
        sidebar:
          $ref: "#/components/schemas/CompositeAppSidebarOverrides"
          description: Optional sidebar display overrides
        header:
          $ref: "#/components/schemas/CompositeAppHeaderOverrides"
          deprecated: true
          x-deprecated-message: >-
            Use `headerMenu` instead. Optional header button visibility
            overrides.

            Still read to seed `headerMenu` defaults for configs saved before
            the header menu existed.
          description: >-
            Deprecated: Use `headerMenu` instead. Optional header button
            visibility overrides.

            Still read to seed `headerMenu` defaults for configs saved before
            the header menu existed.
        userMenu:
          $ref: "#/components/schemas/CompositeAppUserMenuOverrides"
          deprecated: true
          x-deprecated-message: >-
            Use the `user_menu` item in `headerMenu` instead. Optional user menu
            overrides.

            Still read to seed `headerMenu` defaults for configs saved before
            the header menu existed.
          description: >-
            Deprecated: Use the `user_menu` item in `headerMenu` instead.
            Optional user menu overrides.

            Still read to seed `headerMenu` defaults for configs saved before
            the header menu existed.
        headerMenu:
          type: array
          items:
            $ref: "#/components/schemas/CompositeAppHeaderItem"
          description: Optional free-form header menu. When present, the header renders
            from this ordered list instead of the legacy `header`/`userMenu`
            flags. Built-in items (App Portal, Docs, Help, User Menu) can be
            hidden/relabeled/re-icon'd/redirected; custom items are arbitrary
            buttons.
        theme:
          $ref: "#/components/schemas/CompositeAppThemeOverrides"
          description: Optional theme overrides (e.g. disable dark mode)
        homePlugin:
          anyOf:
            - $ref: "#/components/schemas/CompositeAppHomePlugin"
            - type: "null"
          description: Optional home page override. When set, redirects "/" to the
            specified app route instead of the dashboard. Send null to unset.
        apps:
          type: array
          items:
            $ref: "#/components/schemas/CompositeAppEntry"
          description: List of apps to include in the CompositeApp (used for installation
            tracking and fallback sidebar)
        menu:
          type: array
          items:
            $ref: "#/components/schemas/CompositeAppMenuSection"
          description: Optional sidebar menu. When present, the sidebar renders from this
            instead of the apps-based pipeline. Top-level array is sections;
            each section contains nav-items.
      required:
        - project
        - apps
      additionalProperties: false
      description: CompositeApp shell configuration. This is the main configuration
        interface for storing CompositeApp settings. Used as the MongoDB model
        for persisting CompositeApp configurations.
    CompositeAppConfigPayload:
      $ref: "#/components/schemas/Partial_Omit_CompositeAppConfig_id_project"
    ExecutionEnvironmentArray:
      type: array
      items:
        $ref: "#/components/schemas/ExecutionEnvironment"
    ExecutionEnvironment:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        provider:
          $ref: "#/components/schemas/SupportedProviders"
        description:
          type: string
        endpoint_url:
          type: string
        default_model:
          type: string
        enabled_models:
          type: array
          items:
            $ref: "#/components/schemas/AIModel"
        apiKey:
          type: string
        apikey_hint:
          type: string
          description: Hint showing first and last characters of the API key (e.g.
            "AKIA...3xQf"). Stored alongside the encrypted key so the UI can
            display which key is configured.
        config: {}
        settings:
          $ref: "#/components/schemas/ExecutionEnvironmentSettings"
          description: Additional provider-specific settings passed through to the driver.
            For example, custom headers for Apigee-proxied endpoints.
        account:
          type: string
        allowed_projects:
          type: array
          items:
            type: string
        created_by:
          type: string
        updated_by:
          type: string
        created_at:
          type: string
        updated_at:
          type: string
      required:
        - id
        - name
        - provider
        - account
        - created_by
        - updated_by
        - created_at
        - updated_at
      additionalProperties: false
    ExecutionEnvironmentCreatePayload:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
        provider:
          $ref: "#/components/schemas/SupportedProviders"
        description:
          type: string
        endpoint_url:
          type: string
        default_model:
          type: string
        enabled_models:
          type: array
          items:
            $ref: "#/components/schemas/AIModel"
        apiKey:
          type: string
        config: {}
        settings:
          $ref: "#/components/schemas/ExecutionEnvironmentSettings"
          description: Additional provider-specific settings passed through to the driver.
            For example, custom headers for Apigee-proxied endpoints.
        allowed_projects:
          type: array
          items:
            type: string
      required:
        - name
        - provider
    ExecutionEnvironmentUpdatePayload:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
        provider:
          $ref: "#/components/schemas/SupportedProviders"
        description:
          type: string
        endpoint_url:
          type: string
        default_model:
          type: string
        enabled_models:
          type: array
          items:
            $ref: "#/components/schemas/AIModel"
        apiKey:
          type: string
        config: {}
        settings:
          $ref: "#/components/schemas/ExecutionEnvironmentSettings"
          description: Additional provider-specific settings passed through to the driver.
            For example, custom headers for Apigee-proxied endpoints.
        allowed_projects:
          type: array
          items:
            type: string
    ExecutionEnvironmentConfigUpdatePayload:
      type: object
      properties:
        enabled_models:
          type: array
          items:
            $ref: "#/components/schemas/AIModel"
        config:
          anyOf:
            - $ref: "#/components/schemas/MediatorEnvConfig"
            - $ref: "#/components/schemas/LoadBalancingEnvConfig"
      additionalProperties: false
    AIModelArray:
      type: array
      items:
        $ref: "#/components/schemas/AIModel"
    EnableEnvironmentModelPayload:
      type: object
      properties:
        model_id:
          type: string
          description: Provider model ID to resolve from the environment's available model
            listing.
      required:
        - model_id
      additionalProperties: false
    EmbeddingsResult:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/EmbeddingResultItem"
          description: One result item per input, in the same order as
            EmbeddingsOptions.inputs.
        model:
          type: string
          description: The provider model id that produced the result.
        usage:
          $ref: "#/components/schemas/EmbeddingsTokenUsage"
          description: Aggregate token usage when reported by the provider.
      required:
        - results
        - model
      additionalProperties: false
    EmbeddingsApiRequest:
      type: object
      properties:
        inputs:
          type: array
          items:
            $ref: "#/components/schemas/EmbeddingsApiInput"
        model:
          type: string
        task_type:
          $ref: "#/components/schemas/EmbeddingTaskType"
        dimensions:
          type: number
      required:
        - inputs
      additionalProperties: false
    RunAnalyticsResultArray:
      type: array
      items:
        $ref: "#/components/schemas/RunAnalyticsResult"
    RunAnalyticsQuery:
      type: object
      properties:
        filterBy:
          $ref: "#/components/schemas/AnalyticsAxis"
          description: filters to apply to the query
        groupBy:
          $ref: "#/components/schemas/RunAnalyticsGroupBy"
          description: The field to group by
        from:
          type: number
          description: The start date of the query in EPOCH format
        to:
          type: number
          description: The end date of the query in EPOCH format
        resolution:
          $ref: "#/components/schemas/TimeResolution"
          description: The time resolution unit of the analytics query
        resolutionStep:
          type: number
          description: The step size for the resolution (e.g., 4 with resolution='hour'
            means 4-hour intervals). Defaults to 1.
        virtual:
          type: boolean
          description: The field to sort by
      required:
        - filterBy
      additionalProperties: false
    CatalogInteractionRefArray:
      type: array
      items:
        $ref: "#/components/schemas/CatalogInteractionRef"
    CatalogInteractionRef:
      type: object
      properties:
        type:
          type: string
          enum:
            - sys
            - app
            - stored
            - draft
          description: The type of interaction
        id:
          type: string
          description: the interaction id that can be used to execute the interaction.
        name:
          type: string
          description: The interaction name which identify the interaction in the provider
            interaction list. For the stored interactions this is the same as
            the endpoint property. For other types of interactions this is the
            local name of the interaction.
        version:
          type: number
          description: Only applies for stored interactions. The version of the
            interaction. Undefined for non stored interactions
        published:
          type: boolean
          description: Only applies for stored interactions. Whether the interaction is
            published or not.
        tags:
          type: array
          items:
            type: string
          description: The tags associated with the interaction.
        agent_runner_options:
          $ref: "#/components/schemas/AgentRunnerOptions"
          description: Agent Runner configuration options.
        title:
          type: string
          description: The name of the interaction. For display purposes only.
        description:
          type: string
          description: Optional description of the interaction.
      required:
        - type
        - id
        - name
        - tags
        - title
      additionalProperties: false
      description: Reference to an interaction in the catalog. Used in catalog
        listing. The id is composed of the namespace and the interaction name.
        Stored interactions can use `oid:` prefix. If no prefix is used it
        fallback on `oid:`.
    InteractionRefArray:
      type: array
      items:
        $ref: "#/components/schemas/InteractionRef"
    InteractionSearchQuery:
      type: object
      properties:
        name:
          type: string
        status:
          type: array
          items:
            type: string
        limit:
          type: number
        offset:
          type: number
        prompt:
          type: string
        tags:
          type: array
          items:
            type: string
        version:
          type: string
        model:
          type: string
        environment:
          type: string
        is_agent:
          type: boolean
        is_tool:
          type: boolean
        is_skill:
          type: boolean
        is_basic:
          type: boolean
        is_sub_agent:
          type: boolean
      additionalProperties: false
    InteractionTagsArray:
      type: array
      items:
        $ref: "#/components/schemas/InteractionTags"
    InteractionEndpointArray:
      type: array
      items:
        $ref: "#/components/schemas/InteractionEndpoint"
    InteractionEndpointQuery:
      type: object
      properties:
        limit:
          type: number
        offset:
          type: number
        status:
          $ref: "#/components/schemas/InteractionStatus"
        visibility:
          $ref: "#/components/schemas/InteractionVisibility"
        version:
          type: number
        tags:
          type: array
          items:
            type: string
        includes:
          type: array
          items:
            type: string
          description: >-
            Filter by interaction endpoint name to include only the specified
            endpoints

            * If both includes and excludes are specified then only the includes

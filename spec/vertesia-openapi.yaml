      description: >-
        Webhook delivery body format:

        - event_envelope: the full platform event + delivery metadata (default
        for new subscriptions)

        - legacy_notify_endpoint: pre-2025-10 notify_endpoints body {workflowId,
        runId, status, result}

        - workflow_notification: post-COMPLETION_RESULT_V1 notify_endpoints
        body   {workflow_id, workflow_name, workflow_run_id, event_name, detail}
    AgentEventDeliveryTarget:
      type: object
      properties:
        type:
          type: string
          const: agent
        on_match:
          $ref: "#/components/schemas/AgentDeliveryMatchMode"
          description: Behavior when an event matches. Defaults to `start`.
        interaction_ref:
          type: string
          description: Interaction ID, app ref, or system ref. Defaults to the
            general-purpose system agent.
        data:
          type: object
          additionalProperties: true
        config:
          $ref: "#/components/schemas/InteractionExecutionConfiguration"
        interactive:
          type: boolean
        visibility:
          $ref: "#/components/schemas/ConversationVisibility"
        tags:
          type: array
          items:
            type: string
        categories:
          type: array
          items:
            type: string
        tool_names:
          type: array
          items:
            type: string
        max_iterations:
          type: number
        debug_mode:
          type: boolean
        signal_name:
          type: string
          const: UserInput
          description: Signal sent to an existing/restarted run. Only `UserInput` is
            implemented.
        message_path:
          type: string
          description: Dot-path to the message (initial instruction when starting, else
            the signal). Required for signal/ensure.
        client_message_id_path:
          type: string
          description: Dot-path to a stable per-message id, carried on the signal for
            (future) exactly-once dedupe.
        statuses:
          type: array
          items:
            $ref: "#/components/schemas/AgentRunStatus"
          description: Run statuses eligible to receive the signal when a run exists.
            Defaults to ['running'].
        skip_if_path_exists:
          type: string
          description: If this dot-path resolves to a value, the delivery is skipped.
        author_path:
          type: string
          description: Dot-path to the message author, for the loop guard.
        ignore_author_patterns:
          type: array
          items:
            type: string
          description: Regex patterns matched against the resolved author; a match skips
            the delivery (loop guard).
        require_command_prefixes:
          type: array
          items:
            type: string
          description: The message must start with one of these prefixes to be delivered.
        require_mentions:
          type: array
          items:
            type: string
          description: ...or contain one of these mentions. Combined with prefixes as OR.
        missing_thread:
          type: string
          enum:
            - retry
            - skip
          description: "`signal` mode only — no run yet (open/follow-up race): 'retry'
            (default) or 'skip'. Ignored for `ensure`."
        on_terminal:
          type: string
          enum:
            - skip
            - restart
          description: "Behaviour when only terminal runs match: `skip` (default) or
            `restart` then signal."
        metadata:
          type: object
          additionalProperties: true
          description: Extra fields merged into the signal's metadata; same `{{event.*}}`
            / `$event.x` templating as `data`.
      required:
        - type
      additionalProperties: false
    AgentDeliveryMatchMode:
      type: string
      enum:
        - start
        - signal
        - ensure
      description: >-
        How a matching event is applied to the external work-item thread's agent
        run:

        - `start` (default): always start a new run. Gating is done by the
        subscription filter; no   `message_path` is needed.

        - `signal`: deliver only to an *existing* run on the thread (never
        start) — the follow-up path.   `missing_thread` governs the no-run case.

        - `ensure`: deliver to the run on the thread, **starting one if none
        exists**.


        For `signal`/`ensure` the message is delivered **exactly once**: as the
        run's initial instruction when starting, or as a signal to an
        existing/restarted run. Correlation is the provider-neutral
        `eventThreadTag(event_ref)` — the started run is auto-tagged with it and
        follow-ups recompute the same tag to find the run.
    ProcessEventDeliveryTarget:
      type: object
      properties:
        type:
          type: string
          const: process
        process_ref:
          type: string
          description: Stored process ID, app ref, or system ref. Required unless
            process_definition is supplied.
        process_version:
          type: number
        process_definition:
          $ref: "#/components/schemas/ProcessDefinitionBody"
        run_type:
          $ref: "#/components/schemas/ProcessRunType"
        data:
          type: object
          additionalProperties: true
        config:
          type: object
          additionalProperties: true
        visibility:
          $ref: "#/components/schemas/ConversationVisibility"
        tags:
          type: array
          items:
            type: string
        categories:
          type: array
          items:
            type: string
      required:
        - type
      additionalProperties: false
    EventDeliveryTargetInput:
      type: object
      oneOf:
        - $ref: "#/components/schemas/WorkflowEventDeliveryTargetInput"
        - $ref: "#/components/schemas/WebhookEventDeliveryTargetInput"
        - $ref: "#/components/schemas/AgentEventDeliveryTarget"
        - $ref: "#/components/schemas/ProcessEventDeliveryTarget"
      discriminator:
        propertyName: type
        mapping:
          workflow: "#/components/schemas/WorkflowEventDeliveryTargetInput"
          webhook: "#/components/schemas/WebhookEventDeliveryTargetInput"
          agent: "#/components/schemas/AgentEventDeliveryTarget"
          process: "#/components/schemas/ProcessEventDeliveryTarget"
      required:
        - type
    WorkflowEventDeliveryTargetInput:
      type: object

            - created_at
            - document_count
            - size_bytes
          additionalProperties: false
          description: Index status
        mongo_document_count:
          type: number
          description: MongoDB document count for comparison
        reindex_in_progress:
          type: boolean
          description: Whether a reindex is currently in progress
        reindex_progress:
          type: object
          properties:
            total_shards:
              type: number
              description: Total shards to process
            completed_shards:
              type: number
              description: Shards completed so far
            failed_shards:
              type: number
              description: Shards that failed
            status:
              type: string
              description: Current status (e.g., "computing_shards", "indexing", "completed")
            scanned:
              type: number
              description: Documents scanned from source
            written:
              type: number
              description: Documents written to target index
            errors:
              type: number
              description: Documents that failed to index
            embeddings_written:
              type: number
              description: Embedding vectors written to target index
            skipped_embeddings:
              type: number
              description: Embedding vectors skipped because they were invalid or
                dimension-mismatched
            embeddings_text_written:
              type: number
              description: Text embedding vectors written to target index
            embeddings_image_written:
              type: number
              description: Image embedding vectors written to target index
            embeddings_properties_written:
              type: number
              description: Properties embedding vectors written to target index
            embeddings_text_skipped:
              type: number
              description: Text embedding vectors skipped because they were invalid or
                dimension-mismatched
            embeddings_image_skipped:
              type: number
              description: Image embedding vectors skipped because they were invalid or
                dimension-mismatched
            embeddings_properties_skipped:
              type: number
              description: Properties embedding vectors skipped because they were invalid or
                dimension-mismatched
            properties_values_trimmed:
              type: number
              description: Oversized property string values dropped during transform
                (size-based pruning)
            properties_bytes_dropped:
              type: number
              description: Total bytes dropped from oversized property values
            batches_flushed:
              type: number
              description: Total batcher flushes across all completed shards (cumulative)
            bulk_chunks_written:
              type: number
              description: Total ES bulk requests sent across all completed shards
                (cumulative)
            bulk_errors:
              type: number
              description: Total per-document ES bulk-item failures across all shards
                (cumulative). Counts docs ES rejected — they aren't in the
                indexed set.
            avg_docs_per_batch:
              type: number
              description: Average documents per batch flush (written / batches_flushed) —
                useful to spot under/over-batching
            avg_chunks_per_batch:
              type: number
              description: Average chunks per batch (>1 means bulk_size_bytes cap is splitting
                batches frequently)
            docs_per_second:
              type: number
              description: Documents processed per second
            elapsed_seconds:
              type: number
              description: Elapsed time in seconds
            estimated_seconds_remaining:
              type:
                - number
                - "null"
              description: Estimated seconds remaining (null if unknown)
            percent_complete:
              type: number
              description: Percentage complete (0-100)
            alias:
              type: string
              description: Source alias
            target_index:
              type: string
              description: Target index name
          required:
            - total_shards
            - completed_shards
            - failed_shards
            - status
            - scanned
            - written
            - errors
            - docs_per_second
            - elapsed_seconds
            - estimated_seconds_remaining
            - percent_complete
            - alias
            - target_index
          additionalProperties: false
          description: Reindex progress (if reindex is in progress)

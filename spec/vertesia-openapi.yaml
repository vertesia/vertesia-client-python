        output:
          type: array
          items:
            $ref: "#/components/schemas/CompletionResult"
          description: The output of the this conversation step
        token_usage:
          $ref: "#/components/schemas/ExecutionTokenUsage"
          description: The token usage of the this conversation step
        parent:
          $ref: "#/components/schemas/WorkflowAncestor"
          description: If a sub workflow execution, contains the parent's info
        ancestors:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowAncestor"
          description: Full ancestry chain from root to immediate parent (for hierarchical
            aggregation)
        task_id:
          type: string
          description: If part of a larger agentic workflow, task id of this task
        plan:
          $ref: "#/components/schemas/Plan"
          description: Stores the most recent plan for reference by plan-related tools
        debug:
          type: boolean
          description: Debug mode (more logs and persisted artifacts)
        strip_options:
          $ref: "#/components/schemas/ConversationStripOptions"
          description: Configuration for stripping large data from conversation history.
            Passed to llumiverse ExecutionOptions.stripImagesAfterTurns.
        conversation_artifacts_base_url:
          type: string
          description: Conversation artifacts base url
        tool_reference:
          $ref: "#/components/schemas/ToolReference"
          description: Reference to tools stored in GCP instead of embedding full tool
            definitions
        active_tool_names:
          type: array
          items:
            type: string
          description: Names of currently active tools (base + unlocked). Tool definitions
            loaded from tool_reference.
        pinned_tool_names:
          type: array
          items:
            type: string
          description: Active tools that should not be evicted by bounded active-tool
            pruning.
        tool_activation_metadata:
          $ref: "#/components/schemas/ToolActivationMetadataMap"
          description: Activation and usage metadata for tools seen during the
            conversation. Used to keep the active tool set bounded without
            losing recovery context.
        used_skills:
          type: array
          items:
            $ref: "#/components/schemas/UsedSkill"
          description: Skills that have been used in this conversation (for auto-syncing
            scripts and package installation)
        available_skills:
          type: array
          items:
            $ref: "#/components/schemas/AvailableSkill"
          description: All available skills from registered tool collections (for upfront
            hydration in sandbox)
        streaming_enabled:
          type: boolean
          description: Whether to stream LLM responses to Redis (cached from project config)
        user_channels:
          type: array
          items:
            $ref: "#/components/schemas/UserChannel"
          description: Active communication channels with their current state. Channels
            can be updated as conversation progresses (e.g., email threading
            info).
        resolvedInteraction:
          $ref: "#/components/schemas/ResolvedInteractionExecutionInfo"
          description: The resolved interaction execution info. Contains interaction ID,
            name, version, and environment details.
        end_conversation:
          type: object
          properties:
            final_result:
              type: string
            status:
              type: string
              enum:
                - success
                - failure
            reason:
              type: string
          additionalProperties: false
          description: End conversation metadata set when end_conversation tool is called.
            Signals the workflow to terminate gracefully.
        unlocked_tools:
          type: array
          items:
            type: string
          description: "Tools that have been unlocked by skills during the conversation.
            These tools were initially hidden (default: false) but became
            available when a skill with tools was called."
        latest_activity_id:
          type: string
          description: Activity ID from the latest LLM call (for deduplication with
            streamed content). Set by streamToRedis when completing async
            activities.
        latest_streaming_id:
          type: string
          description: Stable streaming ID from the latest LLM call. Unlike Temporal
            activity IDs, this is scoped to the concrete workflow run that
            produced the stream, so it remains safe across continue-as-new.
        skill_tool_map:
          $ref: "#/components/schemas/StringArrayMap"
          description: Mapping of skill names to their related tools. When a skill is
            called, its related tools are added to unlocked_tools.
        skill_instructions_delivered:
          type: array
          items:
            type: string
          description: >-
            Names of skills whose full instructions are already present in the
            live conversation history (i.e. were delivered by a prior
            `learn_<skill>` call). Used to make skill re-activation idempotent:
            a repeat call returns a short "already active" acknowledgement
            instead of re-dumping the instructions.


            Unlike `unlocked_tools`/`skill_tool_map` (which must survive a
            checkpoint so tools stay unlocked), this list is reset when a
            checkpoint compacts the conversation, because the summary no longer
            carries the skill instructions and the next call must re-deliver
            them.
        disabled_mcp_collections:
          type: array
          items:
            type: string
          description: Denylist of MCP tool-collection ids deactivated for this
            conversation. `undefined`/empty means all installed/connected MCP
            collections are active. Updated mid-conversation via the MCP config
            signal; consumed when tools are re-discovered.
        pending_mcp_connections:
          type: array
          items:
            $ref: "#/components/schemas/PendingMcpConnection"
          description: MCP servers that are active (not disabled) and accessible to the
            user but not yet OAuth-connected. Surfaced to the agent (via
            discover_tools) so it can offer to connect.
        active_activity_group_id:
          type: string
          description: Current activity group ID for internal tool-execution progress
            messages. All updates emitted during one tool-execution cycle should
            share this ID.
        finish_reason:
          type: string
          description: LLM stop reason from the latest call (e.g., "stop", "length",
            "tool_use")
        agent_run_id:
          type: string
          description: "The AgentRun ID (MongoDB _id) that owns this conversation. Used
            for artifact storage paths: agents/{agent_run_id}/ Undefined for
            legacy workflows started before the AgentRun system."
        launch_id:
          type: string
          description: "For workstreams: the launch ID assigned by the parent workflow.
            When set, artifacts are stored under
            agents/{agent_run_id}/workstreams/{launch_id}/ to consolidate all
            artifacts under the parent agent run."
      required:
        - run
        - environment
        - options
        - output
        - ancestors
      additionalProperties: false
      description: Conversation state passed between workflow activities. Contains all
        context needed to continue a multi-turn agent conversation.
    AgentToolApprovalMode:
      type: string
      enum:
        - ask
        - auto_review
        - full_control
    ToolApprovalGrantMap:
      type: object
      additionalProperties:
        $ref: "#/components/schemas/ToolApprovalGrant"
    ToolApprovalGrant:
      type: object
      properties:
        key:
          type: string
        tool_name:
          type: string
        target:
          type: string
        granted_at:
          type: string
      required:
        - key
        - tool_name
        - granted_at
      additionalProperties: false
    PendingToolApprovalResults:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/ToolResult"
        reason:
          type: string
          enum:
            - denied
            - denied_with_feedback
            - timeout
            - reviewer_denied
        message:
          type: string
        created_at:
          type: string
      required:
        - results
        - reason
        - message
        - created_at
      additionalProperties: false
    ToolResult:
      type: object
      properties:
        content:
          type: string
        is_error:
          type: boolean
        files:
          type: array
          items:
            type: string
        display_message:
          type: string
          description: Optional message to display in the UI instead of the content. Use
            this when the content is large or technical (e.g., document text)
            and you want to show a friendly message to the user.
        meta:
          type: object
          additionalProperties: true
          description: Can contain metadata returned by the tool executor.
        tool_use_id:
          type: string
        thought_signature:
          type: string
          description: Gemini thinking models require thought_signature to be passed back
            with tool results. Copy this from the ToolUse.thought_signature that
            requested this tool call.
      required:
        - content
        - is_error
        - tool_use_id
      additionalProperties: false
    WorkflowAncestor:
      type: object
      properties:
        run_id:
          type: string
        workflow_id:
          type: string
        run_depth:
          type: number
          description: the depth of nested parent workflows
      required:
        - run_id
        - workflow_id
        - run_depth
      additionalProperties: false
    Plan:
      type: object
      properties:
        plan:
          type: array
          items:
            $ref: "#/components/schemas/PlanTask"
        comment:
          type: string
      required:
        - plan
      additionalProperties: false
    PlanTask:
      type: object
      properties:
        id:
          type: number
        goal:
          type: string
        instructions:
          type: array
          items:
            type: string
        comment:
          type: string
        status:
          type: string
          enum:
            - pending
            - in_progress
            - completed
            - skipped
      required:
        - id
        - goal
      additionalProperties: false
    ConversationStripOptions:
      type: object
      properties:
        images_after_turns:
          type: number
          description: |-
            Number of turns to keep images before stripping them.
            - 0: Strip images immediately after each turn
            - N > 0: Keep images for N turns before stripping (default: 5)
            - Infinity: Never strip images
        text_max_tokens:
          type: number
          description: Maximum tokens for text content before truncation. Text content
            exceeding this limit will be truncated with a marker. Uses ~4
            characters per token estimate.
        heartbeats_after_turns:
          type: number
          description: >-
            Number of turns to keep heartbeat messages before stripping them.
            Heartbeat messages are periodic workstream status updates wrapped in
            `<heartbeat>...</heartbeat>` tags that clutter conversation history.

            - 0: Strip heartbeats immediately after each turn

            - 1 (default): Keep only the most recent heartbeat

            - N > 0: Keep heartbeats for N turns before stripping

            - Infinity: Never strip heartbeats
      additionalProperties: false
      description: Configuration for stripping large data from conversation history to
        prevent JSON serialization issues and reduce storage bloat.
    ToolReference:
      type: object
      properties:
        storage_key:
          type: string
        tool_count:
          type: number
        stored_at:
          type: string
      required:
        - storage_key
        - tool_count
        - stored_at
      additionalProperties: false
      description: Lightweight tool reference for activity payloads. References tools
        stored in GCP instead of embedding full tool definitions.
    ToolActivationMetadataMap:
      type: object
      additionalProperties:
        $ref: "#/components/schemas/ToolActivationMetadata"
    ToolActivationMetadata:
      type: object
      properties:
        activated_at_iteration:
          type: number
          description: Turn when the tool became active in this conversation.
        last_used_iteration:
          type: number
          description: Most recent turn where the tool was actually executed.
        use_count:
          type: number
          description: Number of successful executions in this conversation.
        source:
          type: string
          description: Activation source, e.g. "base", "discover_tools",
            "skill:presentation_authoring".
        pinned:
          type: boolean
          description: Whether this tool is pinned and should be preserved during eviction.
      required:
        - activated_at_iteration
        - use_count
        - source
      additionalProperties: false
    UsedSkill:
      type: object
      properties:
        name:
          type: string
          description: Skill name (e.g., "analyze_data")
        src:
          type: string
          description: Source URL of the skill collection (e.g.,
            "https://tools.vertesia.io/api/skills/data-analysis")
        language:
          type: string
          description: Programming language (e.g., "python")
        packages:
          type: array
          items:
            type: string
          description: Required packages (e.g., ["pandas", "numpy"])
        system_packages:
          type: array
          items:
            type: string
          description: System-level packages to install via sudo apt-get (e.g.,
            ["poppler-utils"])
      required:
        - name
        - src
      additionalProperties: false
      description: Skill metadata tracked when a skill is used
    AvailableSkill:
      type: object
      properties:
        name:
          type: string
          description: Skill name (e.g., "analyze_data") - without the "learn_" prefix
        src:
          type: string
          description: Source URL of the skill collection (e.g.,
            "https://tools.vertesia.io/api/skills/data-analysis"). Undefined for
            interaction-based skills.
      required:
        - name
      additionalProperties: false
      description: Skill metadata collected at workflow start for upfront sandbox hydration
    UserChannel:
      type: object
      discriminator:
        propertyName: type
        mapping:
          email: "#/components/schemas/EmailChannel"
          interactive: "#/components/schemas/InteractiveChannel"
      required:
        - type
      oneOf:
        - $ref: "#/components/schemas/EmailChannel"
        - $ref: "#/components/schemas/InteractiveChannel"
    EmailChannel:
      type: object
      properties:
        type:
          type: string
          const: email
        to_email:
          type: string
          description: Email address to send agent messages to
        thread_subject:
          type: string
          description: Subject for the email thread (without "Re:" prefix)
        in_reply_to:
          type: string
          description: Message ID for In-Reply-To header (most recent message)
        references:
          type: array
          items:
            type: string
          description: Chain of message IDs for References header
        route_key:
          type: string
          description: Short routing key for reply emails (8-char alphanumeric, stored in
            Redis)
      required:
        - type
        - to_email
      additionalProperties: false
      description: Email channel configuration with threading support. Used for
        email-based agent communication.
    InteractiveChannel:
      type: object
      properties:
        type:
          type: string
          const: interactive
      required:
        - type
      additionalProperties: false
      description: Interactive (UI chat) channel configuration. Used for real-time
        chat interface communication.
    StringArrayMap:
      type: object
      additionalProperties:
        type: array
        items:
          type: string
    PendingMcpConnection:
      type: object
      properties:
        app_install_id:
          type: string
          description: The app installation id owning the collection (used for OAuth
            operations).
        collection_id:
          type: string
          description: The MCP tool-collection id.
        name:
          type: string
          description: Human-readable label for the server/collection.
        description:
          type: string
          description: Manifest description of what the server provides (used for
            discovery).
        namespace:
          type: string
          description: Tool-name prefix for this collection.
      required:
        - app_install_id
        - collection_id
        - name
      additionalProperties: false
      description: An MCP server the user can connect to but hasn't yet (active +
        accessible, no OAuth token). Built at tool-discovery time and stored on
        the conversation state so the agent can discover it (by description) and
        ask the user to connect.
    StreamingTelemetryContext:
      type: object
      properties:
        callType:
          $ref: "#/components/schemas/LlmCallType"
          description: "Type of LLM call: start, resume after user message, or resume
            after tool results"
        attemptNumber:
          type: number
          description: Activity retry attempt number
        inferenceStartTime:
          type: number
          description: Timestamp when inference started (for duration calculation)
      required:
        - callType
        - inferenceStartTime
      additionalProperties: false
      description: Telemetry context for streaming mode. Contains info not available
        in current_state needed to send LlmCallEvent.
    LlmCallType:
      type: string
      enum:
        - start
        - resume_tools
        - resume_user
        - checkpoint
        - nested_interaction
      description: Types of LLM calls in a conversation
    ResultStorageOptions:
      type: object
      properties:
        path:
          type: string
          description: Full storage path for the result (e.g., "pages/doc123/page-1.md")
      required:
        - path
      additionalProperties: false
      description: Options for storing inference results to cloud storage
    PromptTemplateInteractionUsage:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        versions:
          type: array
          items:
            $ref: "#/components/schemas/PromptTemplateInteractionVersion"
      required:
        - id
        - name
        - versions
      additionalProperties: false
    PromptTemplateInteractionVersion:
      type: object
      properties:
        version:
          type: number
      required:
        - version
      additionalProperties: false
    SortOption:
      type: object
      properties:
        field:
          type: string
          description: Field path to sort by (e.g. 'updated_at', 'name', 'properties.title')
        order:
          $ref: "#/components/schemas/SortOrder"
          description: Sort direction. Defaults to 'desc'.
      required:
        - field
      additionalProperties: false
    SortOrder:
      type: string
      enum:
        - asc
        - desc
    QuotaEffectiveTier:
      type: string
      description: Effective quota tier name after account-level overrides and
        account-type derivation. Code-defined tier names are currently
        `QuotaTier`, but this remains a string because deployments can introduce
        quota tiers through configuration.
    QuotaStandingResource:
      type: object
      properties:
        resource:
          type: string
        name:
          type: string
        burst:
          $ref: "#/components/schemas/QuotaStandingWindow"
        quota:
          $ref: "#/components/schemas/QuotaStandingWindow"
      required:
        - resource
        - name
        - burst
        - quota
      additionalProperties: false
    QuotaStandingWindow:
      type: object
      properties:
        limit:
          type: number
          description: Effective limit for this window (after effective account tier +
            per-tenant override).
        used:
          type: number
          description: Requests used in the current window.
        remaining:
          type: number
          description: Requests remaining (max(0, limit - used)).
        window_ms:
          type: number
      required:
        - limit
        - used
        - remaining
        - window_ms
      additionalProperties: false
      description: A caller's own quota standing (GET /api/v1/quota/standing) — "where
        am I". API rate limits are genuinely per-tenant; workflow admission and
        the LLM limiter are global/discovered, so they are reported as posture,
        not per-tenant numbers.
    QuotaStandingAdmissionClass:
      type: object
      properties:
        class:
          type: string
          description: Workflow class (e.g. ExecuteConversationWorkflow).
        tenant_active:
          type: number
          description: This tenant's currently active (leased) slots for the class.
      required:
        - class
        - tenant_active
      additionalProperties: false
    AccountType:
      type: string
      enum:
        - vertesia
        - partner
        - free
        - customer
        - prospect
        - unknown
    AccountBilling:
      type: object
      properties:
        method:
          $ref: "#/components/schemas/BillingMethod"
        stripe_customer_id:
          type: string
      required:
        - method
      additionalProperties: false
    BillingMethod:
      type: string
      enum:
        - stripe
        - invoice
    QuotaTier:
      type: string
      enum:
        - standard
        - enterprise
      description: >-
        Quota/rate-limit tier assigned to an account. Code-defined tiers live in
        `@dglabs/quota` (`QUOTA_TIERS`); these names must match its keys.

        - `standard` — protective baseline limits (the default for most
        accounts).

        - `enterprise` — high limits for contracted customers / internal /
        partners.


        An account with no explicit `quota_tier` derives its tier from its
        `account_type`.
    SystemRoles:
      type: string
      enum:
        - owner
        - admin
        - manager
        - developer
        - application
        - automation
        - content_processor
        - consumer
        - executor
        - reader
        - auditor
        - support
        - billing
        - member
        - app_member
        - content_superadmin
    ApiKeyTypes:
      type: string
      const: sk
    AuditTrailEvent:

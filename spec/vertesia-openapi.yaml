          type: string
          description: Unique name within the project (kebab-case identifier).
        display_name:
          type: string
          description: Human-readable display name.
        project:
          type: string
          description: The project this OAuth provider belongs to.
        grant_type:
          type: string
          enum:
            - authorization_code
            - client_credentials
          description: >-
            The OAuth 2.0 grant type to use.

            - 'authorization_code': 3-legged flow requiring user authorization
            (default).

            - 'client_credentials': 2-legged server-to-server flow using
            client_id + client_secret.
        authorization_endpoint:
          type: string
          description: The OAuth 2.0 authorization endpoint URL. Only used for
            authorization_code flow. Optional when endpoints are discovered via
            .well-known (e.g. MCP servers).
        token_endpoint:
          type: string
          description: The OAuth 2.0 token endpoint URL. Optional when endpoints are
            discovered via .well-known (e.g. MCP servers).
        client_id:
          type: string
          description: The OAuth client ID (always required).
        has_client_secret:
          type: boolean
          description: Whether a client_secret is configured (never exposes the actual
            secret).
        default_scopes:
          type: array
          items:
            type: string
          description: Default scopes to request during authorization.
        use_pkce:
          type: boolean
          description: Whether to use PKCE (Proof Key for Code Exchange) in the
            authorization flow. Only applies to authorization_code flow.
            Defaults to true.
        revocation_endpoint:
          type: string
          description: Optional OAuth 2.0 revocation endpoint URL.
        created_at:
          type: string
        updated_at:
          type: string
        id:
          type: string
      required:
        - client_id
        - created_at
        - display_name
        - id
        - name
        - project
        - updated_at
        - use_pkce
      additionalProperties: false
      description: OAuth Provider as returned by the API (with id).
    CreateOAuthProviderPayload:
      type: object
      properties:
        name:
          type: string
        display_name:
          type: string
        grant_type:
          type: string
          enum:
            - authorization_code
            - client_credentials
        authorization_endpoint:
          type: string
        token_endpoint:
          type: string
        client_id:
          type: string
        client_secret:
          type: string
          description: Optional client secret for confidential clients. Will be encrypted
            at rest and never returned in API responses.
        default_scopes:
          type: array
          items:
            type: string
        use_pkce:
          type: boolean
        revocation_endpoint:
          type: string
      required:
        - name
        - display_name
        - client_id
      additionalProperties: false
      description: Payload for creating an OAuth Provider. The client_secret is
        accepted as plaintext on create and stored encrypted.
    UpdateOAuthProviderPayload:
      $ref: "#/components/schemas/Partial_CreateOAuthProviderPayload"
